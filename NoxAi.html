<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOX AI SYSTEM</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#000105; 
    color:#00e5ff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    transition: background 0.5s ease;
    overflow: hidden;
}

.app{
    width: 95%;
    max-width: 1000px;
    height: 90vh;
    background:#00050a; 
    border-radius:15px;
    display:flex;
    flex-direction:row;
    overflow:hidden;
    border:1px solid #00e5ff11; 
    box-shadow: 0 0 0px rgba(0, 229, 255, 0);
    transition: all 0.8s ease;
    position: relative;
}

.standby-screen {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #00050a;
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.5s ease, visibility 0.5s;
}

.standby-core {
    width: 60px;
    height: 60px;
    background: #002233;
    border: 2px solid #00e5ff33;
    border-radius: 50%;
    animation: pulse 2s infinite;
    cursor: pointer;
}

.standby-text {
    margin-top: 20px;
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.4;
    text-align: center;
}

@keyframes pulse {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.2); }
    70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(0, 229, 255, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
}

body.active { background: #000814; }
body.active .app {
    background: #001018;
    border-color: #00e5ff55;
    box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
}
body.active .standby-screen { opacity: 0; visibility: hidden; pointer-events: none; }

.main-container { flex: 1; display: flex; flex-direction: column; height: 100%; }
header{ text-align:center; padding:15px; border-bottom:1px solid #00e5ff33; background: #00141f; }

.logo-3d {
    font-size: 38px; font-weight: bold; text-transform: uppercase; color: #00e5ff;
    text-shadow: 0 1px 0 #0099cc, 0 2px 0 #0088bb, 0 3px 0 #0077aa, 0 5px 10px rgba(0,0,0,0.6), 0 0 10px rgba(0,229,255,0.7);
    position: relative; display: inline-block; margin: 0;
}

.chat{ flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; }
.msg{ padding:12px 16px; border-radius:10px; max-width: 75%; white-space:pre-wrap; line-height: 1.4; word-break: break-word; }
.user{ align-self:flex-end; background:#00e5ff22; border-bottom-right-radius: 2px; }
.ai{ align-self:flex-start; background:#002233; border-bottom-left-radius: 2px; }
.bottom{ display:flex; flex-direction:column; padding:15px; gap:10px; border-top:1px solid #00e5ff33; background: #00141f; }
.row{ display:flex; gap:10px; }

input{ flex:1; padding:12px; border:1px solid #00e5ff33; border-radius:8px; background:#000c14; color:#00e5ff; outline: none; }
input:focus { border-color: #00e5ff; }

button{ padding:12px 20px; border:none; border-radius:8px; background:#00e5ff; color: #000814; font-weight:bold; cursor:pointer; transition: 0.2s; }
button:hover { background: #80f2ff; transform: scale(1.02); }

.btn-mic { background: #002233; color: #00e5ff; border: 1px solid #00e5ff33; }
.btn-mic.listening { background: #ff3366; color: white; animation: pulse 1.5s infinite; border-color: transparent; }

.devPanel{ display:none; padding:20px; background:#000f1a; border-left:1px solid #00e5ff33; width: 280px; box-sizing: border-box; overflow-y: auto; }
.devPanel h3 { margin-top: 0; color: #ff3366; }
.devPanel button { width: 100%; margin-top: 10px; background: #ff3366; color: white; }
</style>
</head>

<body>

<div class="app">
    <div class="standby-screen" id="standby">
        <div class="standby-core" onclick="initAudio()"></div>
        <div class="standby-text" id="statusText">SISTEMA APAGADO<br><span style="font-size:11px; color:#ff3366;">CLIQUE NA ESFERA PARA FAZER O VÍNCULO DE ÁUDIO</span></div>
    </div>

    <div class="main-container">
        <header>
            <h1 class="logo-3d" id="title" data-text="NOX AI">NOX AI</h1>
            <div style="font-size:12px; opacity:0.8; margin-top: 5px;">Sistema de Controle Inteligente</div>
        </header>

        <div class="chat" id="chat"></div>

        <div class="bottom">
            <div class="row">
                <button onclick="openDev()">⚙ Dev</button>
                <button onclick="turnOff()" style="background:#ff3366; color:white;">🔌 Desligar</button>
            </div>
            <div class="row">
                <input id="input" placeholder="Digite ou clique no microfone para falar..." />
                <button id="micBtn" class="btn-mic" onclick="toggleSpeech()">🎙️</button>
                <button onclick="run()">➤</button>
            </div>
        </div>
    </div>

    <div class="devPanel" id="devPanel">
        <h3>🔐 MODO DEV</h3>
        <p>API KEY:</p>
        <input id="apiInput" style="width:100%; margin-bottom: 10px;" placeholder="Insira sua chave aqui..." />
        <p>NOME DA IA:</p>
        <input id="nameInput" style="width:100%; margin-bottom: 15px;" />
        <button onclick="saveDev()">Salvar</button>
        <button onclick="document.getElementById('devPanel').style.display='none'" style="background: #333; color: #fff;">Fechar</button>
    </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const devPanel = document.getElementById("devPanel");
const apiInput = document.getElementById("apiInput");
const nameInput = document.getElementById("nameInput");
const title = document.getElementById("title");
const statusText = document.getElementById("statusText");
const micBtn = document.getElementById("micBtn");

let API_KEY = "";
let isSystemActive = false;
let recognition;
let isListening = false;

let audioContext, analyser, microphone, javascriptNode;
const CLAP_THRESHOLD = 45; 

// Vincula o canal de som e aguarda a palma
function initAudio() {
    if (audioContext) return;
    
    statusText.innerHTML = "INICIALIZANDO MOTOR ACÚSTICO...";
    
    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function(stream) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        microphone = audioContext.createMediaStreamSource(stream);
        javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);
        analyser.smoothingTimeConstant = 0.3;
        analyser.fftSize = 1024;
        microphone.connect(analyser);
        analyser.connect(javascriptNode);
        javascriptNode.connect(audioContext.destination);

        statusText.innerHTML = "SISTEMA OPERACIONAL AMBIENTAL<br><span style='color:#00e5ff; font-weight:bold;'>👋 BATA PALMA PARA INICIAR</span>";

        javascriptNode.onaudioprocess = function() {
            const array = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(array);
            let values = 0;
            for (let i = 0; i < array.length; i++) { values += array[i]; }
            if ((values / array.length) > CLAP_THRESHOLD && !isSystemActive) { turnOn(); }
        }
        initSpeechRecognition(); 
    }).catch(err => { 
        statusText.innerHTML = "<span style='color:red;'>ERRO AO CARREGAR CANAL DE ÁUDIO.</span>"; 
    });
}

//////////////////////////////////////////////////
// 🎤 RECONHECIMENTO DE VOZ (SPEECH-TO-TEXT)
//////////////////////////////////////////////////
function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return;

    recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add("listening");
        input.placeholder = "Ouvindo comando...";
    };

    recognition.onresult = (event) => {
        const textResult = event.results[0][0].transcript;
        input.value = textResult;
        run(); // Processa automaticamente após o término da fala
    };

    recognition.onend = () => {
        isListening = false;
        micBtn.classList.remove("listening");
        input.placeholder = "Digite ou clique no microfone para falar...";
    };
}

function toggleSpeech() {
    if (!recognition) return alert("Reconhecimento de voz indisponível.");
    if (isListening) {
        recognition.stop();
    } else {
        recognition.start();
    }
}

function turnOn() {
    isSystemActive = true;
    document.body.classList.add("active");
    chat.innerHTML = ""; 
    setTimeout(() => {
        add("Nox Ai ao seu dispor.", "ai");
    }, 600);
}

function turnOff() {
    isSystemActive = false;
    document.body.classList.remove("active");
    statusText.innerHTML = "SISTEMA APAGADO<br><span style='color:#00e5ff; font-weight:bold;'>👋 BATA PALMA PARA INICIAR DE NOVO</span>";
}

input.addEventListener("keydown", function(e) { if (e.key === "Enter") { e.preventDefault(); run(); } });

function add(text,type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// Envia comandos de abertura ao arquivo main.js do Electron
function openApp(app){
    app = app.toLowerCase().replace("abrir ", "").trim();
    add("🚀 Invocando software local: " + app, "ai");

    if (window.process && window.process.versions && window.process.versions.electron) {
        const { ipcRenderer } = require('electron');
        ipcRenderer.send('open-program', app);
    } else {
        add("⚠️ Comando aceito, mas requer execução em modo Desktop (.exe)", "ai");
    }
}

async function askAI(msg){
    if(!API_KEY) return "⚠️ Nenhuma API KEY configurada no painel Dev.";
    try{
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
            method:"POST",
            headers:{"Content-Type":"application/json","Authorization":`Bearer ${API_KEY}`,"HTTP-Referer":"http://localhost","X-Title":"NOX AI"},
            body:JSON.stringify({
                model:"openai/gpt-3.5-turbo",
                messages:[
                    {role:"system",content:"Você é a NOX AI, um assistente virtual integrado ao sistema operacional de computador do usuário. Suas respostas devem ser diretas, inteligentes e concisas."},
                    {role:"user",content:msg}
                ]
            })
        });
        const data = await res.json();
        return data.choices?.[0]?.message?.content || "Sem resposta.";
    }catch(e){ return "Erro de conexão."; }
}

async function run(){
    let text = input.value.trim();
    if(!text) return;

    add(text,"user");
    input.value = "";

    // Verifica se o usuário quer executar um programa no PC
    if(text.toLowerCase().startsWith("abrir ")){
        openApp(text);
        return;
    }

    let aiResponse = await askAI(text);
    add(aiResponse,"ai");
}

function openDev(){
    let senha = prompt("Senha Dev:");
    if(senha !== "Davi") return alert("Incorreta!");
    devPanel.style.display = "block";
    apiInput.value = API_KEY;
    nameInput.value = title.innerText;
}

// Salva e atualiza o logo 3D
function saveDev(){
    API_KEY = apiInput.value;
    title.innerText = nameInput.value;
    title.setAttribute('data-text', nameInput.value);
    devPanel.style.display = 'none';
    add("⚙ Diretrizes atualizadas.", "ai");
}
</script>
</body>
</html>
