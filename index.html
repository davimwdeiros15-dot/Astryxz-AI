<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOX AI SYSTEM</title>

<style>
/* Reset básico e ocupação total da tela */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* Customização da barra de rolagem */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: #0d0c12;
}
::-webkit-scrollbar-thumb {
    background: #5a3793;
    border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
    background: #7a52b3;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0d0c12;
    color: #dbcdff;
    height: 100vh;
    width: 100vw;
    display: flex;
    overflow: hidden;
    position: relative;
}

body::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('image_071b05.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    filter: hue-rotate(55deg) brightness(0.4) contrast(1.2);
    z-index: -1;
}

body::after {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, rgba(20, 10, 35, 0.85), rgba(10, 7, 15, 0.95));
    z-index: -1;
}

/* Tela de Standby */
.standby-screen {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: radial-gradient(circle, #160f29 0%, #07040a 100%);
    z-index: 3000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.5s ease, visibility 0.5s;
}

.standby-core {
    width: 90px;
    height: 90px;
    background: #241442;
    border: 2px solid #9d4edd;
    border-radius: 50%;
    animation: pulsePurple 2.5s infinite;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(157, 78, 221, 0.5);
}

.standby-text {
    margin-top: 25px;
    font-size: 14px;
    letter-spacing: 3px;
    color: #c090f9;
    opacity: 0.8;
    text-align: center;
    text-transform: uppercase;
    line-height: 1.8;
    padding: 0 20px;
}

@keyframes pulsePurple {
    0% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(157, 78, 221, 0.6); }
    70% { transform: scale(1); box-shadow: 0 0 0 25px rgba(157, 78, 221, 0); }
    100% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(157, 78, 221, 0); }
}

body.active .standby-screen { opacity: 0; visibility: hidden; pointer-events: none; }

/* TELA DE LOGIN / CADASTRO LOCAL */
.auth-overlay {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(10, 7, 15, 0.95);
    backdrop-filter: blur(20px);
    z-index: 2500;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: all 0.3s ease;
}

.auth-card {
    background: rgba(25, 18, 36, 0.7);
    border: 1px solid rgba(157, 78, 221, 0.3);
    padding: 35px;
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 0 30px rgba(157, 78, 221, 0.15);
    text-align: center;
}

.auth-card h2 {
    font-size: 22px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 25px;
    color: #e2d7ff;
    text-shadow: 0 0 8px rgba(157, 78, 221, 0.5);
}

.auth-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 18px;
    text-align: left;
}

.auth-group label {
    font-size: 12px;
    text-transform: uppercase;
    color: #b39ddb;
    letter-spacing: 1px;
}

.auth-input {
    background: rgba(15, 10, 22, 0.8);
    border: 1px solid rgba(157, 78, 221, 0.3);
    padding: 14px;
    border-radius: 10px;
    color: #ffffff;
    font-size: 15px;
    outline: none;
}

.auth-input:focus {
    border-color: #9d4edd;
}

.auth-btn {
    width: 100%;
    padding: 14px;
    background: #4a148c;
    border: 1px solid #7c4dff;
    border-radius: 12px;
    color: #ffffff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
}

.auth-btn:hover {
    background: #6200ea;
    box-shadow: 0 0 15px rgba(124, 77, 255, 0.4);
}

.auth-toggle-text {
    font-size: 13px;
    color: #b39ddb;
    margin-top: 20px;
    cursor: pointer;
    text-decoration: underline;
}

/* BARRA LATERAL */
.sidebar {

.sidebar-overlay {

    .msg { max-width: 90%; font-size: 15px; padding: 12px 18px; }
    .bottom { padding: 15px 20px; }
    .input-wrapper { padding: 4px 8px; }
    input { padding: 10px 5px; font-size: 15px; }
}
</style>
</head>

<script>
// ==========================================
// CONFIGURAÇÃO DA CHAVE DO PROJETO NOX AI
// Sua nova chave mestra do OpenRouter ativa e embutida
const CHAVE_MESTRA = "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";
// ==========================================

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const title = document.getElementById("title");
const statusText = document.getElementById("statusText");
const micBtn = document.getElementById("micBtn");
const sendBtn = document.getElementById("sendBtn");
const historyList = document.getElementById("historyList");
const userSubtitle = document.getElementById("userSubtitle");
const inputWrapper = document.getElementById("inputWrapper");

const authOverlay = document.getElementById("authOverlay");
const authTitle = document.getElementById("authTitle");
const authNick = document.getElementById("authNick");
const authPass = document.getElementById("authPass");
const authSubmitBtn = document.getElementById("authSubmitBtn");
const authToggleLink = document.getElementById("authToggleLink");

let isSystemActive = false;
let recognition;
let isListening = false;
let localHistory = [];
let isSignUpMode = false;
let loggedUser = null;

// Filtro de termos ofensivos / palavrões
const badWords = ["porra", "caralho", "merda", "puta", "viado", "fdp", "corno", "bosta", "cacete", "vtnm"];

function containsBadWords(text) {
    const cleanText = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    return badWords.some(word => cleanText.includes(word));
}

function checkSession() {
    const savedUser = localStorage.getItem("nox_active_user");
    if (savedUser) {
        loginSuccess(savedUser);
    } else {
        showAuthForm();
    }
}

function showAuthForm() {
    if(!isSystemActive) return;
    authOverlay.style.display = "flex";
    setChatLockState(true);
}

function toggleAuthMode() {
    isSignUpMode = !isSignUpMode;
    if (isSignUpMode) {
        authTitle.innerText = "Criar Nova Conta";
        authSubmitBtn.innerText = "Cadastrar e Entrar";
        authToggleLink.innerText = "Já tem uma conta? Faça Login";
    } else {
        authTitle.innerText = "Acessar Nox AI";
        authSubmitBtn.innerText = "Entrar no Terminal";
        authToggleLink.innerText = "Não tem uma conta? Cadastre-se";
    }
    authNick.value = "";
    authPass.value = "";
}

function submitAuthForm() {
    const nick = authNick.value.trim();
    const pass = authPass.value.trim();

    if (!nick || !pass) {
        alert("Preencha todos os campos!");
        return;
    }

    if (containsBadWords(nick)) {
        alert("🔒 Erro de Protocolo: Uso de linguagem imprópria detectado no Nickname!");
        authNick.value = "";
        return;
    }

    let users = JSON.parse(localStorage.getItem("nox_registered_users")) || {};

    if (isSignUpMode) {
        if (users[nick]) {
            alert("Este Nickname já está em uso!");
            return;
        }
        users[nick] = pass;
        localStorage.setItem("nox_registered_users", JSON.stringify(users));
        alert("Conta criada com sucesso!");
        loginSuccess(nick);
    } else {
        if (users[nick] && users[nick] === pass) {
            loginSuccess(nick);
        } else {
            alert("Nickname ou Senha incorretos.");
        }
    }
}

function loginSuccess(nick) {
    loggedUser = nick;
    localStorage.setItem("nox_active_user", nick); 
    authOverlay.style.display = "none";
    userSubtitle.innerText = `Operador: ${nick}`;
    setChatLockState(false);
    
    localHistory = JSON.parse(localStorage.getItem(`history_${nick}`)) || [];
    renderHistoryList();
}

function logoutLocal() {
    localStorage.removeItem("nox_active_user");
    loggedUser = null;
    userSubtitle.innerText = "Acesso Restrito";
    authNick.value = "";
    authPass.value = "";
    if(isSignUpMode) toggleAuthMode();
    showAuthForm();
}

function forceSecurityDisconnect() {
    alert("❌ CONEXÃO ENCERRADA:\nUso de termos ofensivos detectado no terminal. O seu usuário foi desconectado por violar as regras do sistema.");
    localStorage.removeItem("nox_active_user");
    loggedUser = null;
    userSubtitle.innerText = "Acesso Restrito";
    authNick.value = "";
    authPass.value = "";
    input.value = "";
    if(isSignUpMode) toggleAuthMode();
    showAuthForm();
}

function setChatLockState(isBlocked) {
    if (isBlocked) {
        inputWrapper.classList.add("blocked");
        input.disabled = true;
        micBtn.disabled = true;
        sendBtn.disabled = true;
        input.placeholder = "Faça login para desbloquear o terminal..."
    } else {
        inputWrapper.classList.remove("blocked");
        input.disabled = false;
        micBtn.disabled = false;
        sendBtn.disabled = false;
        input.placeholder = "Digite ou envie um comando...";
    }
}

function initSpeechRecognition() {
    const SpeechRecognition = window.webkitSpeechRecognition || window.Recognition;
    if (!SpeechRecognition) return;

    recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add("listening");
        input.placeholder = "Escutando comandos...";
    };

    recognition.onresult = (event) => {
        input.value = event.results[0][0].transcript;
        run(); 
    };

    recognition.onend = () => {
        isListening = false;
        micBtn.classList.remove("listening");
        input.placeholder = "Digite ou envie um comando...";
    };
}

initSpeechRecognition();

function toggleSidebar() {
    document.body.classList.toggle("sidebar-open");
}

function clearChatMobile() {
    clearChat();
    if(window.innerWidth <= 768) toggleSidebar();
}

function turnOffMobile() {
    turnOff();
    if(window.innerWidth <= 768) toggleSidebar();
}

function updateWidgetTime() {
    const now = new Date();
    const element = document.getElementById('widget-time');
    if(element) {
        element.innerText = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
    }
}
setInterval(updateWidgetTime, 1000);
updateWidgetTime();

function toggleSpeech() {
    if (!loggedUser) return;
    if (!recognition) return alert("Reconhecimento de voz indisponível.");
    if (isListening) { recognition.stop(); } else { recognition.start(); }
}

function turnOn() {
    isSystemActive = true;
    document.body.classList.add("active");
    chat.innerHTML = ""; 
    
    checkSession();

    setTimeout(() => { 
        if (loggedUser) window.addMessageToScreen("Nox AI ligada. Terminal ativo e pronto para comandos.", "ai"); 
    }, 600);
}

function turnOff() {
    isSystemActive = false;
    document.body.classList.remove("active");
    authOverlay.style.display = "none";
    statusText.innerHTML = "SISTEMA APAGADO<br><span style='color:#c090f9; font-weight:bold;'>Clique no núcleo para retornar</span>";
}

input.addEventListener("keydown", function(e) { if (e.key === "Enter") { e.preventDefault(); run(); } });

window.addMessageToScreen = function(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function clearChat() {
    chat.innerHTML = "";
    window.addMessageToScreen("Nova sessão iniciada. Nox AI pronta.", "ai");
    input.value = "";
    if(loggedUser) input.focus();
}

function renderHistoryList() {
    if (!historyList) return;
    historyList.innerHTML = "";
    if (!loggedUser || localHistory.length === 0) {
        historyList.innerHTML = '<div style="font-size: 12px; color: #7e6f99; padding: 10px; text-align: center;">Nenhuma conversa salva neste perfil.</div>';
        return;
    }

    localHistory.forEach((data, index) => {
        const item = document.createElement("button");
        item.className = "history-item";
        item.innerText = data.userInput;
        item.onclick = () => {
            document.querySelectorAll('.history-item').forEach(el => el.classList.remove('selected'));
            item.classList.add('selected');
            
            chat.innerHTML = "";
            window.addMessageToScreen(data.userInput, "user");
            window.addMessageToScreen(data.aiOutput, "ai");
            if(window.innerWidth <= 768) toggleSidebar();
        };
        historyList.appendChild(item);
    });
}

async function askAI(msg){
    if(!CHAVE_MESTRA || CHAVE_MESTRA.includes("COLE_AQUI")) {
        return "⚠️ Erro crítico: O desenvolvedor ainda não configurou a CHAVE_MESTRA dentro do código.";
    }
    
    try{
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":`Bearer ${CHAVE_MESTRA}`,
                "HTTP-Referer": window.location.origin,
                "X-Title":"NOX AI"
            },
            body:JSON.stringify({
                model:"openai/gpt-4o-mini",
                messages:[
                    {role:"system",content:"Você é a NOX AI. Suas respostas devem ser curtas, diretas, inteligentes e extremamente concisas."},
                    {role:"user",content:msg}
                ]
            })
        });
        const data = await res.json();
        if(data.error) {
            return `❌ Erro do OpenRouter (${data.error.code}): ${data.error.message}`;
        }
        return data.choices?.[0]?.message?.content || "Sem resposta.";
    }catch(e){ return "Sem resposta da rede externa."; }
}

async function run(){
    if(!loggedUser) return;

    let text = input.value.trim();
    if(!text) return;

    if (containsBadWords(text)) {
        forceSecurityDisconnect();
        return;
    }

    window.addMessageToScreen(text, "user");
    input.value = "";

    let aiResponse = await askAI(text);
    window.addMessageToScreen(aiResponse, "ai");

    localHistory.unshift({ userInput: text, aiOutput: aiResponse });
    localStorage.setItem(`history_${loggedUser}`, JSON.stringify(localHistory));
    renderHistoryList();
}
</script>
