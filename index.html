<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOX AI SYSTEM</title>

<style>
/* Reset básico e ocupação total da tela */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0d0c12; /* Fundo escuro uniforme baseado nas imagens */
    color: #c5b3e6;
    height: 100vh;
    width: 100vw;
    display: flex;
    overflow: hidden;
}

/* Tela de Standby Futurista Minimalista */
.standby-screen {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: #0c0c10;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.5s ease, visibility 0.5s;
}

.standby-core {
    width: 90px;
    height: 90px;
    background: #1a1525;
    border: 2px solid #7a52b3;
    border-radius: 50%;
    animation: pulsePurple 2.5s infinite;
    cursor: pointer;
}

.standby-text {
    margin-top: 25px;
    font-size: 14px;
    letter-spacing: 3px;
    color: #8c76b2;
    opacity: 0.7;
    text-align: center;
    text-transform: uppercase;
    line-height: 1.8;
}

@keyframes pulsePurple {
    0% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(122, 82, 179, 0.3); }
    70% { transform: scale(1); box-shadow: 0 0 0 25px rgba(122, 82, 179, 0); }
    100% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(122, 82, 179, 0); }
}

body.active .standby-screen { opacity: 0; visibility: hidden; pointer-events: none; }

/* BARRA LATERAL - ESTILO MENU LATERAL DE CONVERSAS (TELA INTEIRA) */
.sidebar {
    width: 320px;
    background: #121118; /* Tom cinza escuro levemente roxo */
    border-right: 1px solid #221f2d;
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 15px;
    flex-shrink: 0;
}

/* Botão Nova Conversa no Topo */
.new-chat-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid #382e4d;
    border-radius: 12px;
    color: #dbcdff;
    font-size: 15px;
    font-weight: 500;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 25px;
}
.new-chat-btn:hover {
    background: #1c1a26;
}

/* Seção de Lembrete de Conversas com Scroll Independente */
.conversations-section {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding-right: 5px;
}

.section-title {
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #685885;
    margin-bottom: 10px;
    margin-left: 8px;
}

/* Itens das conversas anteriores */
.history-item {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    color: #bfaecf;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    background: transparent;
    border: none;
}
.history-item:hover {
    background: #1c1a26;
    color: #ffffff;
}
.history-item.selected {
    background: #251f35;
    color: #e5dcff;
    font-weight: 500;
}

/* Área de Widgets menores embutidos na lateral */
.sidebar-widgets {
    border-top: 1px solid #221f2d;
    padding-top: 15px;
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.widget-text {
    font-size: 12px;
    color: #685885;
    display: flex;
    justify-content: space-between;
}

/* Rodapé do Menu Lateral - Configurações e Ajuda */
.sidebar-footer {
    border-top: 1px solid #221f2d;
    padding-top: 15px;
    margin-top: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.footer-btn {
    width: 100%;
    background: transparent;
    border: none;
    padding: 12px;
    border-radius: 10px;
    color: #bfaecf;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.2s;
}
.footer-btn:hover {
    background: #1c1a26;
    color: #fff;
}

/* CONTAINER PRINCIPAL DO CHAT (OCUPA O RESTANTE DA TELA) */
.main-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: #0d0c12;
}

header {
    padding: 20px 40px;
    border-bottom: 1px solid #1c1a26;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #0d0c12;
}

.logo-interface {
    font-size: 26px;
    font-weight: 700;
    text-transform: uppercase;
    color: #dbcdff;
    letter-spacing: 2px;
}

/* Janela de Mensagens */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 25px;
}

.msg {
    padding: 16px 24px;
    border-radius: 18px;
    max-width: 75%;
    white-space: pre-wrap;
    line-height: 1.6;
    word-break: break-word;
    font-size: 16px;
}

.user {
    align-self: flex-end;
    background: #251f35;
    color: #e5dcff;
    border-bottom-right-radius: 4px;
}

.ai {
    align-self: flex-start;
    background: #14131a;
    color: #bfaecf;
    border: 1px solid #221f2d;
    border-bottom-left-radius: 4px;
}

/* Área de Input Inferior Estilo Chat Completo */
.bottom {
    padding: 30px 40px;
    background: #0d0c12;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.input-wrapper {
    display: flex;
    background: #121118;
    border: 1px solid #221f2d;
    border-radius: 16px;
    padding: 6px 12px;
    align-items: center;
    gap: 10px;
}

input {
    flex: 1;
    padding: 14px 10px;
    border: none;
    background: transparent;
    color: #dbcdff;
    outline: none;
    font-size: 16px;
}

/* Botões de Ação */
button.action-btn {
    padding: 12px 24px;
    border: none;
    border-radius: 12px;
    background: #251f35;
    color: #c5b3e6;
    font-weight: 600;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.2s;
    border: 1px solid #382e4d;
}
button.action-btn:hover { background: #33294a; color: #fff; }

.btn-mic {
    background: transparent;
    border: none;
    color: #a38ec4;
    font-size: 20px;
    cursor: pointer;
    padding: 10px;
    transition: color 0.2s;
}
.btn-mic.listening {
    color: #ffb3d1;
    animation: pulsePurple 1.5s infinite;
}

.btn-send {
    background: #251f35;
    border: 1px solid #382e4d;
    color: #dbcdff;
    font-size: 18px;
    padding: 10px 18px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
}
.btn-send:hover { background: #33294a; color: #fff; }

/* Painel Dev */
.devPanel {
    display: none;
    padding: 25px;
    background: #121118;
    border-left: 1px solid #221f2d;
    width: 320px;
    position: absolute;
    right: 0; top: 0;
    height: 100%;
    z-index: 2000;
}
.devPanel h3 { margin-top: 0; color: #a38ec4; font-size: 18px; }
.devPanel input { background: #0d0c12; border: 1px solid #221f2d; width: 100%; border-radius: 10px; margin-bottom: 15px; padding: 12px; }
</style>
</head>

<body>

    <div class="standby-screen" id="standby">
        <div class="standby-core" onclick="initAudio()"></div>
        <div class="standby-text" id="statusText">SISTEMA ADORMECIDO<br><span style="font-size:12px; color:#7a52b3;">Clique no núcleo para vincular áudio</span></div>
    </div>

    <div class="sidebar">
        <button class="new-chat-btn" onclick="clearChat()">
            <span>📝</span> Nova conversa
        </button>

        <div class="section-title">Conversas</div>
        
        <div class="conversations-section" id="historyList">
            <button class="history-item selected" onclick="focusInput()">Nox AI: Diretrizes Iniciais</button>
        </div>

        <div class="sidebar-widgets">
            <div class="widget-text">
                <span>⏱️ Hora local:</span>
                <span id="widget-time" style="color: #dbcdff; font-weight: bold;">00:00</span>
            </div>
            <div class="widget-text">
                <span>📊 RAM livre:</span>
                <span style="color: #dbcdff;">57.1%</span>
            </div>
        </div>

        <div class="sidebar-footer">
            <button class="footer-btn" onclick="openDev()">⚙️ Configurações e ajuda</button>
            <button class="footer-btn" onclick="turnOff()" style="color: #ffb3b3;">🔌 Desligar sistema</button>
        </div>
    </div>

    <div class="main-container">
        <header>
            <h1 class="logo-interface" id="title">NOX AI</h1>
            <div style="font-size: 13px; color: #685885; letter-spacing: 1px; text-transform: uppercase;">Sistema de Controle Inteligente</div>
        </header>

        <div class="chat" id="chat"></div>

        <div class="bottom">
            <div class="input-wrapper">
                <input id="input" placeholder="Digite ou envie um comando para o sistema..." />
                <button id="micBtn" class="btn-mic" onclick="toggleSpeech()">🎙️</button>
                <button class="btn-send" onclick="run()">➤</button>
            </div>
        </div>
    </div>

    <div class="devPanel" id="devPanel">
        <h3>🔐 PARÂMETROS DO TERMINAL</h3>
        <p style="font-size: 12px; color: #685885; margin-top: 15px; margin-bottom: 5px;">NOME DA INTERFACE:</p>
        <input id="nameInput" />
        <button class="action-btn" style="width: 100%; margin-bottom: 10px;" onclick="saveDev()">Salvar Modificações</button>
        <button class="action-btn" style="width: 100%; background: #14131a; color: #685885;" onclick="document.getElementById('devPanel').style.display='none'">Voltar</button>
    </div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const devPanel = document.getElementById("devPanel");
const nameInput = document.getElementById("nameInput");
const title = document.getElementById("title");
const statusText = document.getElementById("statusText");
const micBtn = document.getElementById("micBtn");
const historyList = document.getElementById("historyList");

// Chave do OpenRouter Fixada
const API_KEY = "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";

let isSystemActive = false;
let recognition;
let isListening = false;
let audioContext, analyser, microphone, javascriptNode;
const CLAP_THRESHOLD = 45; 

function updateWidgetTime() {
    const now = new Date();
    document.getElementById('widget-time').innerText = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
}
setInterval(updateWidgetTime, 1000);
updateWidgetTime();

function initAudio() {
    if (audioContext) return;
    statusText.innerHTML = "SINCRO-SISTEMA ATIVANDO...";
    
    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function(stream) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        microphone = audioContext.createMediaStreamSource(stream);
        javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);
        analyser.smoothingTimeConstant = 0.3;
        analyser.fftSize = 1024;
        microphone.connect(analyser);
        analyser.connect(javascriptNode);
        javascriptNode.connect(audioContext.destination);

        statusText.innerHTML = "SISTEMA AMBIENTAL PRONTO<br><span style='color:#a38ec4; font-weight:bold;'>👋 BATA PALMA PARA ENTRAR</span>";

        javascriptNode.onaudioprocess = function() {
            const array = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(array);
            let values = 0;
            for (let i = 0; i < array.length; i++) { values += array[i]; }
            if ((values / array.length) > CLAP_THRESHOLD && !isSystemActive) { turnOn(); }
        }
        initSpeechRecognition(); 
    }).catch(err => { 
        statusText.innerHTML = "<span style='color:#ffb3b3;'>ERRO DE CONEXÃO ACÚSTICA.</span>"; 
    });
}

function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return;

    recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add("listening");
        input.placeholder = "Escutando comandos...";
    };

    recognition.onresult = (event) => {
        input.value = event.results[0][0].transcript;
        run(); 
    };

    recognition.onend = () => {
        isListening = false;
        micBtn.classList.remove("listening");
        input.placeholder = "Digite ou envie um comando para o sistema...";
    };
}

function toggleSpeech() {
    if (!recognition) return alert("Reconhecimento de voz indisponível.");
    if (isListening) { recognition.stop(); } else { recognition.start(); }
}

function turnOn() {
    isSystemActive = true;
    document.body.classList.add("active");
    chat.innerHTML = ""; 
    setTimeout(() => { add("Nox Ai ao seu dispor.", "ai"); }, 600);
}

function turnOff() {
    isSystemActive = false;
    document.body.classList.remove("active");
    statusText.innerHTML = "SISTEMA APAGADO<br><span style='color:#a38ec4; font-weight:bold;'>👋 BATA PALMA PARA RETORNAR</span>";
}

input.addEventListener("keydown", function(e) { if (e.key === "Enter") { e.preventDefault(); run(); } });

function add(text, type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    if(type === "user") {
        addReminderList(text);
    }
}

function addReminderList(text) {
    // Remove o status selecionado dos itens anteriores
    document.querySelectorAll('.history-item').forEach(el => el.classList.remove('selected'));

    const item = document.createElement("button");
    item.className = "history-item selected";
    item.innerText = text;
    item.onclick = () => {
        document.querySelectorAll('.history-item').forEach(el => el.classList.remove('selected'));
        item.classList.add('selected');
        input.value = text;
        input.focus();
    };
    
    if(historyList.firstChild) {
        historyList.insertBefore(item, historyList.firstChild);
    } else {
        historyList.appendChild(item);
    }
}

function clearChat() {
    chat.innerHTML = "";
    add("Nova sessão iniciada. Nox AI pronta.", "ai");
    input.value = "";
    input.focus();
}

function focusInput() {
    input.focus();
}

async function askAI(msg){
    if(!API_KEY || API_KEY.trim() === "") return "⚠️ Nenhuma API KEY configurada no código.";
    try{
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":`Bearer ${API_KEY}`,
                "HTTP-Referer":"http://localhost",
                "X-Title":"NOX AI"
            },
            body:JSON.stringify({
                model:"openai/gpt-3.5-turbo",
                messages:[
                    {role:"system",content:"Você é a NOX AI. Suas respostas devem ser curtas, diretas, inteligentes e extremamente concisas."},
                    {role:"user",content:msg}
                ]
            })
        });
        const data = await res.json();
        return data.choices?.[0]?.message?.content || "Sem resposta.";
    }catch(e){ return "Sem resposta da rede externa."; }
}

async function run(){
    let text = input.value.trim();
    if(!text) return;

    add(text, "user");
    input.value = "";

    let aiResponse = await askAI(text);
    add(aiResponse, "ai");
}

function openDev(){
    let senha = prompt("Autenticação do Desenvolvedor:");
    if(senha !== "Davi") return alert("Acesso Negado.");
    devPanel.style.display = "block";
    nameInput.value = title.innerText;
}

function saveDev() {
    title.innerText = nameInput.value;
    devPanel.style.display = 'none';
}
</script>
</body>
</html>
