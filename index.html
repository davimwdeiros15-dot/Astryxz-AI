<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NOX AI — Nexus Station</title>

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)']],
                displayMath: [['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --bg-primary: #020005;
            --bg-grid: rgba(168, 85, 247, 0.03);
            --bg-gradient-1: rgba(124, 58, 237, 0.12);
            --bg-gradient-2: rgba(6, 182, 212, 0.08);
            --bg-base: #070314;
            --accent-primary: #a855f7;
            --accent-secondary: #06b6d4;
            --accent-glow: rgba(168, 85, 247, 0.3);
            --border-color: rgba(168, 85, 247, 0.15);
            --btn-gradient: linear-gradient(135deg, #7c3aed, #06b6d4);
            --text-glow: linear-gradient(135deg, #ffffff 20%, #c084fc 60%, #06b6d4 100%);
            --avatar-bg: linear-gradient(135deg, #7c3aed, #06b6d4);
            --msg-user-bg: rgba(168, 85, 247, 0.12);
            --msg-user-border: rgba(168, 85, 247, 0.2);
            --sidebar-header-border: rgba(168, 85, 247, 0.25);
            --sidebar-header-bg: rgba(168, 85, 247, 0.05);
        }

        /* PALETA DO MODO DEV (VERMELHO FUTURISTA) */
        body.dev-mode {
            --bg-primary: #050000;
            --bg-grid: rgba(239, 68, 68, 0.03);
            --bg-gradient-1: rgba(220, 38, 38, 0.15);
            --bg-gradient-2: rgba(185, 28, 28, 0.06);
            --bg-base: #100202;
            --accent-primary: #ef4444;
            --accent-secondary: #f87171;
            --accent-glow: rgba(239, 68, 68, 0.4);
            --border-color: rgba(239, 68, 68, 0.25);
            --btn-gradient: linear-gradient(135deg, #b91c1c, #ef4444);
            --text-glow: linear-gradient(135deg, #ffffff 20%, #f87171 60%, #b91c1c 100%);
            --avatar-bg: linear-gradient(135deg, #dc2626, #f87171);
            --msg-user-bg: rgba(239, 68, 68, 0.15);
            --msg-user-border: rgba(239, 68, 68, 0.3);
            --sidebar-header-border: rgba(239, 68, 68, 0.4);
            --sidebar-header-bg: rgba(239, 68, 68, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: #f1f5f9;
            height: 100vh;
            overflow: hidden;
            display: flex;
            position: relative;
            transition: background 0.5s ease;
        }

        /* FUNDO CYBERPUNK DINÂMICO */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(var(--bg-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px),
                radial-gradient(circle at 50% 30%, var(--bg-gradient-1), transparent 50%),
                radial-gradient(circle at 90% 80%, var(--bg-gradient-2), transparent 45%),
                linear-gradient(180deg, var(--bg-base) 0%, var(--bg-primary) 100__);
            background-size: 40px 40px, 40px 40px, 100% 100%, 100% 100%, 100% 100%;
            z-index: -3;
        }

        .ambient-glow {
            position: absolute;
            top: 0;
            left: 280px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        body.dev-mode .ambient-glow {
            background: radial-gradient(circle, rgba(239, 68, 68, 0.05) 0%, transparent 70%);
        }

        .particles {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -2;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: linear-gradient(to bottom, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            opacity: .4;
            animation: float linear infinite;
        }

        @keyframes float {
            from { transform: translateY(105vh) scale(0.8); }
            to { transform: translateY(-5vh) scale(1.2); }
        }

        /* TELA DE LOGIN ESTILO TERMINAL */
        .login-screen {
            position: fixed;
            inset: 0;
            background: rgba(3, 1, 10, 0.95);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .login-card {
            background: rgba(10, 6, 22, 0.7);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 45px 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 60px rgba(168, 85, 247, 0.05), inset 0 0 20px rgba(168, 85, 247, 0.1);
            animation: cardSpawn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transition: border 0.5s ease;
        }

        @keyframes cardSpawn {
            from { opacity: 0; transform: scale(0.92) translateY(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .brand-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 24px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            box-shadow: 0 0 30px var(--accent-glow);
            margin-bottom: 20px;
            transition: border 0.5s ease, box-shadow 0.5s ease;
        }

        .logo-text {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 7px;
            background: var(--text-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--accent-glow);
            transition: text-shadow 0.5s ease;
        }

        .login-subtitle {
            font-size: 13.5px;
            color: #94a3b8;
            margin-bottom: 35px;
            letter-spacing: 0.5px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 28px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-secondary);
            margin-bottom: 10px;
        }

        .login-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 14px 18px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .login-input:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: var(--btn-gradient);
            color: white;
            font-size: 14.5px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
            box-shadow: 0 6px 25px var(--accent-glow);
        }

        /* SIDEBAR COMPLETA COM CREDITOS E CLIMA */
        .sidebar {
            width: 290px;
            background: rgba(5, 3, 10, 0.75);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--border-color);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            transition: transform 0.3s ease, border-right 0.5s ease;
        }

        .sidebar-header {
            display: flex;
            gap: 10px;
        }

        /* DASHBOARD DE REGIAO, CLIMA E DATA/HORA */
        .dashboard-widget {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: border 0.5s ease;
        }

        .widget-time {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
        }

        .widget-weather {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12.5px;
            color: #94a3b8;
        }

        .weather-temp {
            color: var(--accent-secondary);
            font-weight: 600;
        }

        .new-chat-btn {
            flex: 1;
            padding: 13px;
            border: 1px solid var(--sidebar-header-border);
            border-radius: 10px;
            background: var(--sidebar-header-bg);
            color: #f3e8ff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            background: var(--btn-gradient);
            border-color: transparent;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            padding: 13px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .conversations-section {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        .conversations-section::-webkit-scrollbar { width: 4px; }
        .conversations-section::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.05); border-radius: 4px; }

        .history-item {
            width: 100%;
            border: 1px solid transparent;
            padding: 11px 14px;
            border-radius: 8px;
            background: transparent;
            color: #94a3b8;
            text-align: left;
            cursor: pointer;
            margin-bottom: 6px;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.02);
            color: #f1f5f9;
            border-left: 2px solid var(--accent-primary);
            padding-left: 12px;
        }

        /* SEÇÃO DE CRÉDITOS DO RODAPÉ */
        .sidebar-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .dev-tag {
            font-size: 12px;
            color: var(--accent-primary);
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: color 0.5s ease;
        }

        .dev-instagram {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            transition: color 0.2s;
        }

        .dev-instagram:hover {
            color: var(--accent-secondary);
        }

        .dev-instagram svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* CONTAINER PRINCIPAL */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
        }

        /* HEADER */
        header {
            padding: 16px 40px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(4, 2, 10, 0.3);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
            transition: border-bottom 0.5s ease;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-toggle {
            display: none;
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 20px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            padding: 4px 14px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            transition: border 0.5s ease;
        }

        .nav-logo-text {
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 4px;
            background: var(--text-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: background 0.5s ease;
        }

        .model-selector {
            background: rgba(10, 6, 22, 0.8);
            color: #cbd5e1;
            border: 1px solid var(--border-color);
            padding: 7px 14px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-size: 12.5px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .model-selector:hover { border-color: var(--accent-secondary); }
        .model-selector:focus { border-color: var(--accent-primary); box-shadow: 0 0 15px var(--accent-glow); }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11.5px;
            font-weight: 600;
            color: #34d399;
            background: rgba(52, 211, 153, 0.06);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(52, 211, 153, 0.15);
        }

        body.dev-mode .status-badge {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.06);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #34d399;
            border-radius: 50%;
            box-shadow: 0 0 10px #34d399;
        }

        body.dev-mode .status-dot {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        /* BOAS VINDAS */
        .welcome-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 1;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .welcome-title {
            font-size: 38px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            animation: fadeInDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .welcome-subtitle { color: #475569; font-size: 15px; letter-spacing: 0.5px; margin-bottom: 8px; }
        .welcome-version { font-size: 13px; font-weight: 700; color: var(--accent-primary); letter-spacing: 2px; opacity: 0.9; text-transform: uppercase; margin-top: 10px; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CHAT */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20% 180px 20%; 
            display: flex;
            flex-direction: column;
            gap: 36px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 2;
        }

        .chat.active { opacity: 1; pointer-events: auto; }
        .chat::-webkit-scrollbar { width: 5px; }
        .chat::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.03); border-radius: 10px; }

        .msg-container { display: flex; gap: 18px; width: 100%; animation: fade .4s cubic-bezier(0.16, 1, 0.3, 1); }
        .msg-container.user-container { justify-content: flex-end; }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .ai-avatar { 
            background: var(--avatar-bg); 
            box-shadow: 0 0 15px var(--accent-glow);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        .msg { max-width: 78%; padding: 15px 22px; border-radius: 16px; font-size: 15px; line-height: 1.6; word-wrap: break-word; }

        @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { background: var(--msg-user-bg); color: #ffffff; border-radius: 16px 16px 4px 16px; border: 1px solid var(--msg-user-border); transition: background 0.5s ease, border 0.5s ease; }
        .ai { color: #e2e8f0; border-radius: 4px 16px 16px 16px; padding-top: 4px; }
        
        .ai h3 { margin: 16px 0 8px 0; color: var(--accent-primary); font-size: 17px; transition: color 0.5s ease; }
        .ai strong { color: #ffffff; font-weight: 600; }
        .ai br { margin-bottom: 6px; }
        
        .chat-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: block;
        }

        /* INPUT FIXO INFERIOR */
        .bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 40px 20%;
            background: linear-gradient(to top, var(--bg-primary) 65%, transparent);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 3;
        }

        .bottom.centered { bottom: 30%; }

        .input-box-container {
            max-width: 780px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .image-preview-container {
            display: none;
            align-items: center;
            background: rgba(10, 6, 22, 0.85);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 12px;
            align-self: flex-start;
            gap: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .image-preview-container img {
            height: 44px;
            width: 44px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .remove-image-btn { background: transparent; border: none; color: #f87171; cursor: pointer; font-size: 15px; font-weight: bold; }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 14px;
            background: rgba(10, 6, 22, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 12px 14px 12px 18px;
            transition: all 0.3s ease;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-secondary);
            background: rgba(12, 8, 26, 0.8);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
        }

        textarea {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            color: #f1f5f9;
            font-size: 15.5px;
            resize: none;
            max-height: 200px;
            height: 24px;
            line-height: 24px;
            padding: 0;
            font-family: inherit;
        }

        textarea::placeholder { color: #475569; }

        .btn-attach {
            background: transparent;
            border: none;
            color: #64748b;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-attach:hover { color: var(--accent-secondary); background: rgba(255, 255, 255, 0.02); }
        .btn-attach svg { width: 19px; height: 19px; fill: currentColor; }

        .btn-send {
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            color: #05020c;
            background: #f1f5f9;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-send:hover { transform: scale(1.05); background: #ffffff; box-shadow: 0 0 15px rgba(255,255,255,0.4); }
        .btn-send svg { width: 15px; height: 15px; fill: currentColor; }

        .loader { display: flex; gap: 6px; padding: 12px 0; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-primary); animation: bounce 1.2s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: .2s; background: var(--accent-secondary); }
        .dot:nth-child(3) { animation-delay: .4s; background: #f43f5e; }
        @keyframes bounce { 0%, 100% { transform: scale(0.7); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 1; } }

        @media(max-width:1024px){ .chat { padding: 40px 8% 180px 8%; } .bottom { padding: 40px 8%; } }
        @media(max-width:768px){
            .menu-toggle { display: block; }
            .sidebar { position: fixed; top: 0; bottom: 0; left: 0; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            header { padding: 16px 20px; }
            .chat { padding: 20px 16px 160px 16px; gap: 26px; }
            .bottom { padding: 16px; }
            .bottom.centered { bottom: 32%; }
            .msg { max-width: 88%; }
            .welcome-title { font-size: 28px; }
        }
    </style>
</head>

<body>

<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <div class="brand-container">
            <div class="logo-text" id="loginLogo">NOX AI</div>
        </div>

<script>
const API_KEY = "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";

/* ELEMENTOS */

/* ATIVADOR DO MODO DEV */

input.addEventListener("input", () => {

/* CAPTURAR IMAGEM PASTE */
input.addEventListener("paste", function(e) {
    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
    for (let index in items) {
        const item = items[index];
        if (item.kind === 'file' && item.type.startsWith('image/')) {
            const blob = item.getAsFile();
            const reader = new FileReader();
            reader.onload = function(event) {
                selectedImageBase64 = event.target.result;
                imagePreview.src = selectedImageBase64;
                imagePreviewContainer.style.display = "flex";
            };
            reader.readAsDataURL(blob);
            e.preventDefault(); 
            break;
        }
    }
});

function previewImage(fileInputElement) {
    const file = fileInputElement.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function (e) {
        selectedImageBase64 = e.target.result; 
        imagePreview.src = selectedImageBase64;

}

function removeSelectedImage() {
    selectedImageBase64 = "";

function autoGrow(element) {
    element.style.height = "24px";

/* MARCDOWN E LATEX */
function parseMarkdown(text) {
    if (!text) return "";
    let html = text;
    html = html.replace(/\\\[([\s\S]*?)\\\]/g, function(match, formula) {
        return '\\[ ' + formula.replace(/\n/g, ' __BLOCK_NL__ ') + ' \\]';
    });
    html = html.replace(/\\\(([\s\S]*?)\\\)/g, function(match, formula) {
        return '\\( ' + formula.replace(/\n/g, ' __INLINE_NL__ ') + ' \\)';
    });

    html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    
    html = html.replace(/\n/g, '<br>');
    html = html.replace(/__BLOCK_NL__/g, '\n').replace(/__INLINE_NL__/g, '\n');
    return html;
}

function triggerMathRender() {
    if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
        window.MathJax.typesetPromise().catch((err) => console.log('MathJax erro:', err));
    }
}

function createParticles(){
    const container = document.getElementById("particles");
    container.innerHTML = "";
    for(let i=0; i<40; i++){
        const particle = document.createElement("div");
        particle.className = "particle";
        particle.style.left = Math.random()*100 + "%";
        particle.style.top = Math.random()*100 + "%";
        particle.style.animationDuration = (12 + Math.random()*12) + "s";
        particle.style.opacity = (0.1 + Math.random()*0.3).toString();
        container.appendChild(particle);
    }
}
createParticles();

function transitionToChatMode() {
    if (isFirstMessage) {
        welcomeScreen.style.opacity = "0";
        welcomeScreen.style.transform = "translateY(-10px)";
        setTimeout(() => welcomeScreen.style.display = "none", 400);

        bottomContainer.classList.remove("centered");
        chat.classList.add("active");
        isFirstMessage = false;
    }
}

function addMessage(text, type, imgData = ""){
    const container = document.createElement("div");
    container.className = "msg-container " + (type === "user" ? "user-container" : "");

    if(type === "ai") {
        const avatar = document.createElement("div");
        avatar.className = "avatar ai-avatar";
        avatar.innerText = isDevMode ? "D" : "N";
        container.appendChild(avatar);
    }

    const div = document.createElement("div");
    div.className = "msg " + type;
    
    if (imgData) {
        const img = document.createElement("img");
        img.src = imgData;
        img.className = "chat-image";
        div.appendChild(img);
        
        if(text) {
            const txtNode = document.createElement("p");
            txtNode.style.marginTop = "12px";
            txtNode.innerHTML = parseMarkdown(text);
            div.appendChild(txtNode);
        }
    } else {
        div.innerHTML = parseMarkdown(text);
    }
    
    container.appendChild(div);
    chat.appendChild(container);
    chat.scrollTop = chat.scrollHeight;
    
    triggerMathRender();
}

async function typeMessage(text){
    if (!text) return;
    const container = document.createElement("div");
    container.className = "msg-container";

    const avatar = document.createElement("div");
    avatar.className = "avatar ai-avatar";
    avatar.innerText = isDevMode ? "D" : "N";
    container.appendChild(avatar);

    const div = document.createElement("div");
    div.className = "msg ai";
    container.appendChild(div);
    chat.appendChild(container);
    
    div.innerHTML = parseMarkdown(text);
    chat.scrollTop = chat.scrollHeight;
    triggerMathRender();
}

function showLoader(){
    const container = document.createElement("div");
    container.className = "msg-container";
    container.id = "loader";

    const avatar = document.createElement("div");
    avatar.className = "avatar ai-avatar";
    avatar.innerText = isDevMode ? "D" : "N";
    container.appendChild(avatar);

    const div = document.createElement("div");
    div.className = "msg ai";
    div.innerHTML = `
    <div class="loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>`;
    
    container.appendChild(div);
    chat.appendChild(container);
    chat.scrollTop = chat.scrollHeight;
}

function removeLoader(){
    const loader = document.getElementById("loader");
    if(loader) loader.remove();
}

async function askAI(message, imageBase64){
    try {
        const selectedModel = document.getElementById("modelSelect").value;
        let messageContent = [];
        
        if (message) {
            messageContent.push({ type: "text", text: message });
        } else if (imageBase64) {
            messageContent.push({ type: "text", text: "Analise ou resolva esta imagem fornecendo explicações estruturadas e detalhadas." });
        }

        if (imageBase64) {
            messageContent.push({
                type: "image_url",
                image_url: { url: imageBase64 }
            });
        }

        const devSystemPrompt = `Você é o núcleo interno DEV_CORE da NOX AI. Modo de engenharia ativado por ${currentUsername}. Suas respostas devem ser extremamente técnicas, cirúrgicas, objetivas e com estilo de terminal hacker. Quando receber equações ou problemas matemáticos, use obrigatoriamente a notação LaTeX padrão como '\\[ ... \\]' para blocos isolados ou '\\( ... \\)' para inline.`;
        const normalSystemPrompt = `Você é a NOX AI. Respostas inteligentes, organizadas e diretas. Você está conversando com ${currentUsername}. Quando receber exercícios ou problemas que envolvam fórmulas, equações e matemática estruturada, resolva detalhadamente utilizando obrigatoriamente notação LaTeX padrão como '\\[ ... \\]' para blocos de equações isolados ou '\\( ... \\)' para símbolos/expressões inline integrados ao meio do texto comum. Jamais deixe quebras de linha brutas fora dos blocos do LaTeX.`;

        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
                model: selectedModel,
                messages: [
                    { 
                        role: "system", 
                        content: isDevMode ? devSystemPrompt : normalSystemPrompt
                    },
                    { 
                        role: "user", 
                        content: messageContent 
                    }
                ]
            })
        });

        const data = await response.json();
        
        if (!response.ok || !data || data.error) {
            let errMsg = "Erro de resposta da API.";
            if (data && data.error) {
                errMsg = typeof data.error === 'object' ? (data.error.message || JSON.stringify(data.error)) : data.error;
            } else if (response.status) {
                errMsg = "Erro HTTP " + response.status;
            }
            return "### [ERRO DE TRANSMISSÃO]\n" + errMsg + "\n\n*Nota: Se sua chave de API foi revogada automaticamente por vazamento, você precisará gerar uma nova chave no OpenRouter.*";
        }
        
        return data.choices?.[0]?.message?.content || "Sem resposta retornada do modelo.";
    }
    catch(error) {
        console.error(error);
        return "### [ERRO CRÍTICO]\nFalha de conexão física com os servidores da IA: " + error.message;
    }
}

async function run(){
    const text = input.value.trim();
    const imageToSend = selectedImageBase64; 

    if(!text && !imageToSend) return;

    transitionToChatMode();
    addMessage(text, "user", imageToSend);
    
    input.value = "";
    input.style.height = "24px"; 
    removeSelectedImage();
    
    showLoader();
    const aiResponse = await askAI(text, imageToSend);
    removeLoader();
    
    if (aiResponse) {
        await typeMessage(aiResponse);
        localHistory.unshift({ userInput: text || "📷 Transmissão Visual", aiOutput: aiResponse });
        renderHistory();
    }
}

function renderHistory(){
    historyList.innerHTML = "";
    localHistory.forEach(item => {
        const button = document.createElement("button");
        button.className = "history-item";
        button.innerText = item.userInput;
        button.onclick = () => {
            transitionToChatMode();
            chat.innerHTML = "";
            addMessage(item.userInput, "user");
            addMessage(item.aiOutput, "ai");
        };
        historyList.appendChild(button);
    });
}

function clearChat(){
    chat.innerHTML = "";
    chat.classList.remove("active");
    
    welcomeScreen.style.display = "flex";
    setTimeout(() => {
        welcomeScreen.style.opacity = "1";
        welcomeScreen.style.transform = "translateY(0)";
    }, 50);

    bottomContainer.classList.add("centered");
    isFirstMessage = true;
    input.value = "";
    input.style.height = "24px";
    removeSelectedImage();
}

input.addEventListener("keydown", (e) => {
    if(e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        run();
    }
});
