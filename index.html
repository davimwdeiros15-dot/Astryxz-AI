<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOX AI SYSTEM</title>

<style>
/* Reset básico e ocupação total da tela */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* Customização da barra de rolagem */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: #0d0c12;
}
::-webkit-scrollbar-thumb {
    background: #5a3793;
    border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
    background: #7a52b3;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0d0c12;
    color: #dbcdff;
    height: 100vh;
    width: 100vw;
    display: flex;
    overflow: hidden;
    position: relative;
}

body::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('image_071b05.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    filter: hue-rotate(55deg) brightness(0.4) contrast(1.2);
    z-index: -1;
}

body::after {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, rgba(20, 10, 35, 0.85), rgba(10, 7, 15, 0.95));
    z-index: -1;
}

/* Tela de Standby */
.standby-screen {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: radial-gradient(circle, #160f29 0%, #07040a 100%);
    z-index: 3000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.5s ease, visibility 0.5s;
}

.standby-core {
    width: 90px;
    height: 90px;
    background: #241442;
    border: 2px solid #9d4edd;
    border-radius: 50%;
    animation: pulsePurple 2.5s infinite;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(157, 78, 221, 0.5);
}

.standby-text {
    margin-top: 25px;
    font-size: 14px;
    letter-spacing: 3px;
    color: #c090f9;
    opacity: 0.8;
    text-align: center;
    text-transform: uppercase;
    line-height: 1.8;
    padding: 0 20px;
}

@keyframes pulsePurple {
    0% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(157, 78, 221, 0.6); }
    70% { transform: scale(1); box-shadow: 0 0 0 25px rgba(157, 78, 221, 0); }
    100% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(157, 78, 221, 0); }
}

body.active .standby-screen { opacity: 0; visibility: hidden; pointer-events: none; }

/* BARRA LATERAL */
.sidebar {
    width: 320px;
    background: rgba(15, 12, 22, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-right: 1px solid rgba(141, 75, 230, 0.2);
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 15px;
    flex-shrink: 0;
    transition: transform 0.3s ease;
    z-index: 2000;
}

.new-chat-btn {
    width: 100%;
    padding: 14px;
    background: rgba(90, 55, 147, 0.2);
    border: 1px solid rgba(157, 78, 221, 0.4);
    border-radius: 12px;
    color: #e2d7ff;
    font-size: 15px;
    font-weight: 500;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 25px;
}
.new-chat-btn:hover {
    background: rgba(157, 78, 221, 0.35);
    box-shadow: 0 0 12px rgba(157, 78, 221, 0.3);
}

.conversations-section {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding-right: 5px;
}

.section-title {
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #b39ddb;
    margin-bottom: 10px;
    margin-left: 8px;
    opacity: 0.8;
}

.history-item {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    color: #c5b3e6;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    background: transparent;
    border: none;
}
.history-item:hover {
    background: rgba(141, 75, 230, 0.15);
    color: #ffffff;
}
.history-item.selected {
    background: rgba(141, 75, 230, 0.3);
    border-left: 3px solid #9d4edd;
    color: #ffffff;
    font-weight: 500;
}

.sidebar-widgets {
    border-top: 1px solid rgba(141, 75, 230, 0.2);
    padding-top: 15px;
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.widget-text {
    font-size: 12px;
    color: #b39ddb;

    justify-content: space-between;

}

.sidebar-footer {

    padding-top: 15px;
    margin-top: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.footer-btn {
    width: 100%;
    background: transparent;
    border: none;
    padding: 12px;
    border-radius: 10px;
    color: #c5b3e6;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.2s;
}
.footer-btn:hover {
    background: rgba(141, 75, 230, 0.15);
    color: #fff;
}

/* Estilo do Botão Google customizado */
.btn-google {

.btn-google:hover {

}
.btn-google svg {

}

.sidebar-credits {

    margin-top: 10px;
    padding-top: 12px;
    text-align: center;
    font-size: 12px;
    color: #9d4edd;
}

.credits-link {
    display: inline-flex;

.credits-link:hover { color: #ffffff; }
.credits-link svg { width: 14px; height: 14px; fill: currentColor; }

/* CONTAINER PRINCIPAL DO CHAT */
.main-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: rgba(10, 8, 14, 0.3);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);

header {

.header-left {

}

.menu-toggle {

.logo-interface {

.chat {

.msg {

.user {

}

/* Mensagem de alerta do sistema */
.system-alert {

}

.bottom {

    background: rgba(13, 11, 18, 0.6);
    border-top: 1px solid rgba(141, 75, 230, 0.15);
    display: flex;
    flex-direction: column;
    gap: 15px;

.input-wrapper {
    display: flex;
    background: rgba(23, 18, 32, 0.9);
    border: 1px solid rgba(157, 78, 221, 0.3);
    border-radius: 16px;
    padding: 6px 12px;
    align-items: center;
    gap: 10px;
    box-shadow: 0 0 15px rgba(157, 78, 221, 0.1);
}

.input-wrapper:focus-within {
    border-color: rgba(157, 78, 221, 0.8);
    box-shadow: 0 0 18px rgba(157, 78, 221, 0.25);
}

/* Estilo visual para input desativado antes do login */
.input-wrapper.blocked {
    background: rgba(20, 15, 25, 0.5);
    border-color: rgba(141, 75, 230, 0.1);
    box-shadow: none;
    cursor: not-allowed;
}

input {
    flex: 1;
    padding: 14px 10px;
    border: none;
    background: transparent;
    color: #ffffff;
    outline: none;
    font-size: 16px;
}
input::placeholder { color: #7e6f99; }
input:disabled { cursor: not-allowed; color: #5a4f73; }

.btn-mic {
    background: transparent;
    border: none;
    color: #b39ddb;
    font-size: 20px;
    cursor: pointer;
    padding: 10px;
    transition: color 0.2s;
}
.btn-mic:hover { color: #d1c4e9; }
.btn-mic.listening {
    color: #ff80ab;
    animation: pulsePurple 1.5s infinite;
}
.btn-mic:disabled { opacity: 0.3; cursor: not-allowed; }

.btn-send {
    background: #4a148c;
    border: 1px solid #7c4dff;

.btn-send:hover { background: #6200ea; box-shadow: 0 0 12px rgba(124, 77, 255, 0.5); }
.btn-send:disabled { background: #1e1330; border-color: #311b92; color: #5a4f73; cursor: not-allowed; box-shadow: none !important; }

.sidebar-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1500;
}

@media (max-width: 768px) {
    .menu-toggle { display: block; }
    .header-subtitle { display: none; }
    header { padding: 15px 20px; }
    .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); }
    body.sidebar-open .sidebar { transform: translateX(0); box-shadow: 5px 0 25px rgba(0,0,0,0.6); }
    body.sidebar-open .sidebar-overlay { display: block; }
    .chat { padding: 20px; gap: 15px; }
    .msg { max-width: 90%; font-size: 15px; padding: 12px 18px; }
    .bottom { padding: 15px 20px; }
    .input-wrapper { padding: 4px 8px; }
    input { padding: 10px 5px; font-size: 15px; }
}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithRedirect, GoogleAuthProvider, signOut, onAuthStateChanged, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// Configurações do painel do Firebase (nox-ai-570fd)
const firebaseConfig = {
    apiKey: "AIzaSyCew7kG_h5PFFr35E2c-Dsainvt1AkImsY",
    authDomain: "nox-ai-570fd.firebaseapp.com",
    projectId: "nox-ai-570fd",
    storageBucket: "nox-ai-570fd.firebasestorage.app",
    messagingSenderId: "221325042813",
    appId: "1:221325042813:web:af839bc5cc05a21860bd14",
    measurementId: "G-BFWQG7F7NC"
};

// Inicializações do Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// Variáveis Globais de Estado do Usuário
let currentUser = null;
let unsubscribeSnapshot = null;

const authBtnText = document.getElementById("authBtnText");
const userSubtitle = document.getElementById("userSubtitle");
const noAuthNotice = document.getElementById("no-auth-notice");

// Gerencia login/logout usando redirecionamento para evitar bloqueadores de popups
window.handleAuth = async function() {
    if (!currentUser) {
        try {
            await signInWithRedirect(auth, provider);
        } catch (error) {
            console.error("Erro ao iniciar login por redirecionamento:", error);
            alert("Não foi possível iniciar a autenticação. Verifique sua conexão.");
        }
    } else {
        if(confirm("Deseja desconectar sua conta do Google?")) {
            signOut(auth);
        }
    }
}

// Captura o resultado do redirecionamento ao retornar para a página
getRedirectResult(auth).then((result) => {
    if (result?.user) {
        console.log("Login efetuado via redirect com sucesso:", result.user.displayName);
    }
}).catch((error) => {
    console.error("Erro ao processar retorno do redirecionamento:", error);
});

// Observador do Estado de Login
onAuthStateChanged(auth, (user) => {
    currentUser = user;
    window.isUserLoggedIn = !!user; 

    if (user) {
        authBtnText.innerText = "Desconectar Conta";
        userSubtitle.innerText = `Operador: ${user.displayName}`;
        if(noAuthNotice) noAuthNotice.style.display = 'none';
        
        window.setChatLockState(false); 
        listenToConversations(user.uid);
    } else {
        authBtnText.innerText = "Entrar com o Google";
        userSubtitle.innerText = "Acesso Convidado";
        const historyList = document.getElementById("historyList");
        if(historyList) {
            historyList.innerHTML = '<div id="no-auth-notice" style="font-size: 12px; color: #7e6f99; padding: 10px; text-align: center;">Faça login para salvar suas conversas na nuvem.</div>';
        }
        
        window.setChatLockState(true); 
        if (unsubscribeSnapshot) unsubscribeSnapshot();
    }
});

function listenToConversations(uid) {
    if (unsubscribeSnapshot) unsubscribeSnapshot();
    const historyList = document.getElementById("historyList");

    const q = query(
        collection(db, "conversas_nox"),
        where("userId", "==", uid),
        orderBy("timestamp", "desc")
    );

    unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
        if(!historyList) return;
        historyList.innerHTML = "";
        if(snapshot.empty) {
            historyList.innerHTML = '<div style="font-size: 12px; color: #7e6f99; padding: 10px; text-align: center;">Nenhum histórico encontrado.</div>';
            return;
        }
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            const item = document.createElement("button");
            item.className = "history-item";
            item.innerText = data.userInput;
            item.onclick = () => {
                document.querySelectorAll('.history-item').forEach(el => el.classList.remove('selected'));
                item.classList.add('selected');
                
                const chat = document.getElementById("chat");
                if(chat) {
                    chat.innerHTML = "";
                    window.addMessageToScreen(data.userInput, "user");
                    window.addMessageToScreen(data.aiOutput, "ai");
                }
                if(window.innerWidth <= 768) window.toggleSidebar();
            };
            historyList.appendChild(item);
        });
    }, (error) => {
        console.error("Aviso de sincronização do histórico:", error);
    });
}

window.saveConversationToCloud = async function(userInput, aiOutput) {
    if (!currentUser) return;
    try {
        await addDoc(collection(db, "conversas_nox"), {
            userId: currentUser.uid,
            userInput: userInput,
            aiOutput: aiOutput,
            timestamp: new Date()
        });
    } catch (e) {
        console.error("Erro ao salvar dados na nuvem (Verifique as regras do Firestore):", e);
    }
}
</script>

<script>
// Lógica de Controle da Interface do Chat

const sendBtn = document.getElementById("sendBtn");
const inputWrapper = document.getElementById("inputWrapper");

const API_KEY = "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";

let isSystemActive = false;
let recognition;
let isListening = false;
window.isUserLoggedIn = false; 

window.setChatLockState = function(isBlocked) {
    if (isBlocked) {
        inputWrapper.classList.add("blocked");
        input.disabled = true;
        micBtn.disabled = true;
        sendBtn.disabled = true;
        input.placeholder = "Faça login com o Google para desbloquear o terminal...";
    } else {
        inputWrapper.classList.remove("blocked");
        input.disabled = false;
        micBtn.disabled = false;
        sendBtn.disabled = false;
        input.placeholder = "Digite ou envie um comando...";
    }
}

function initSpeechRecognition() {
    const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
    if (!SpeechRecognition) return;

    recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add("listening");
        input.placeholder = "Escutando comandos...";
    };

    recognition.onresult = (event) => {
        input.value = event.results[0][0].transcript;
        run(); 
    };

    recognition.onend = () => {
        isListening = false;
        micBtn.classList.remove("listening");
        input.placeholder = "Digite ou envie um comando...";
    };
}

initSpeechRecognition();

function toggleSidebar() {
    document.body.classList.toggle("sidebar-open");
}

function focusInputMobile() {
    if(!window.isUserLoggedIn) return;
    input.focus();
    if(window.innerWidth <= 768) toggleSidebar();
}

function clearChatMobile() {
    clearChat();
    if(window.innerWidth <= 768) toggleSidebar();
}

function turnOffMobile() {
    turnOff();
    if(window.innerWidth <= 768) toggleSidebar();
}

function updateWidgetTime() {
    const now = new Date();
    const element = document.getElementById('widget-time');
    if(element) {
        element.innerText = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
    }
}
setInterval(updateWidgetTime, 1000);
updateWidgetTime();

function toggleSpeech() {
    if (!window.isUserLoggedIn) return showAuthAlert();
    if (!recognition) return alert("Reconhecimento de voz indisponível.");
    if (isListening) { recognition.stop(); } else { recognition.start(); }
}

function turnOn() {
    isSystemActive = true;
    document.body.classList.add("active");
    chat.innerHTML = ""; 
    setTimeout(() => { 
        window.addMessageToScreen("Nox Ai ligada. Por favor, certifique-se de realizar a autenticação para acessar os servidores principais.", "ai"); 
    }, 600);
}

function turnOff() {
    isSystemActive = false;
    document.body.classList.remove("active");
    statusText.innerHTML = "SISTEMA APAGADO<br><span style='color:#c090f9; font-weight:bold;'>Clique no núcleo para retornar</span>";
}

input.addEventListener("keydown", function(e) { if (e.key === "Enter") { e.preventDefault(); run(); } });

window.addMessageToScreen = function(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showAuthAlert() {
    window.addMessageToScreen("❌ NEGADO: Autenticação do Google obrigatória para interagir com a inteligência artificial.", "system-alert");
}

function clearChat() {
    chat.innerHTML = "";
    window.addMessageToScreen("Nova sessão iniciada. Nox AI pronta.", "ai");
    input.value = "";
    if(window.isUserLoggedIn) input.focus();
}

async function askAI(msg){
    if(!API_KEY || API_KEY.trim() === "") return "⚠️ Nenhuma API KEY configurada no código.";
    try{
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":`Bearer ${API_KEY}`,
                "HTTP-Referer": window.location.origin,
                "X-Title":"NOX AI"
            },
            body:JSON.stringify({
                model:"openai/gpt-3.5-turbo",
                messages:[
                    {role:"system",content:"Você é a NOX AI. Suas respostas devem ser curtas, diretas, inteligentes e extremamente concisas."},
                    {role:"user",content:msg}
                ]
            })
        });
        const data = await res.json();
        return data.choices?.[0]?.message?.content || "Sem resposta.";
    }catch(e){ return "Sem resposta da rede externa."; }
}

async function run(){
    if (!window.isUserLoggedIn) {
        showAuthAlert();
        input.value = "";
        return;
    }

    let text = input.value.trim();
    if(!text) return;

    window.addMessageToScreen(text, "user");
    input.value = "";

    let aiResponse = await askAI(text);
    window.addMessageToScreen(aiResponse, "ai");

    if(typeof window.saveConversationToCloud === "function"){
        window.saveConversationToCloud(text, aiResponse);
    }
}
</script>
</body>
</html>
