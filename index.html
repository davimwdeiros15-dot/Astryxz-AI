<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOX AI SYSTEM</title>

<style>
/* Reset básico e ocupação total da tela */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* Customização da barra de rolagem para combinar com o tema roxo */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: #0d0c12;
}
::-webkit-scrollbar-thumb {
    background: #5a3793;
    border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
    background: #7a52b3;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0d0c12;
    color: #dbcdff;
    height: 100vh;
    width: 100vw;
    display: flex;
    overflow: hidden;
    position: relative;
}

/* Container para a imagem de fundo com efeito Matrix Roxa */
body::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    /* Carrega a imagem enviada */
    background-image: url('image_071b05.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    /* Altera o espectro de cor do azul original para o roxo cyber */
    filter: hue-rotate(55deg) brightness(0.4) contrast(1.2);
    z-index: -1;
}

/* Camada extra de degradê para suavizar o fundo */
body::after {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, rgba(20, 10, 35, 0.85), rgba(10, 7, 15, 0.95));
    z-index: -1;
}

/* Tela de Standby Futurista Minimalista */
.standby-screen {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: radial-gradient(circle, #160f29 0%, #07040a 100%);
    z-index: 3000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.5s ease, visibility 0.5s;
}

.standby-core {
    width: 90px;
    height: 90px;
    background: #241442;
    border: 2px solid #9d4edd;
    border-radius: 50%;
    animation: pulsePurple 2.5s infinite;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(157, 78, 221, 0.5);
}

.standby-text {
    margin-top: 25px;
    font-size: 14px;
    letter-spacing: 3px;
    color: #c090f9;
    opacity: 0.8;
    text-align: center;
    text-transform: uppercase;
    line-height: 1.8;
    padding: 0 20px;
}

@keyframes pulsePurple {
    0% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(157, 78, 221, 0.6); }
    70% { transform: scale(1); box-shadow: 0 0 0 25px rgba(157, 78, 221, 0); }
    100% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(157, 78, 221, 0); }
}

body.active .standby-screen { opacity: 0; visibility: hidden; pointer-events: none; }

/* BARRA LATERAL - Efeito de vidro escurecido roxo */
.sidebar {
    width: 320px;
    background: rgba(15, 12, 22, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-right: 1px solid rgba(141, 75, 230, 0.2);
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 15px;
    flex-shrink: 0;
    transition: transform 0.3s ease;
    z-index: 2000;
}

/* Botão Nova Conversa no Topo */
.new-chat-btn {
    width: 100%;
    padding: 14px;
    background: rgba(90, 55, 147, 0.2);
    border: 1px solid rgba(157, 78, 221, 0.4);
    border-radius: 12px;
    color: #e2d7ff;
    font-size: 15px;
    font-weight: 500;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 25px;
}
.new-chat-btn:hover {
    background: rgba(157, 78, 221, 0.35);
    box-shadow: 0 0 12px rgba(157, 78, 221, 0.3);
}

/* Seção de Lembrete de Conversas com Scroll Independente */
.conversations-section {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding-right: 5px;
}

.section-title {
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #b39ddb;
    margin-bottom: 10px;
    margin-left: 8px;
    opacity: 0.8;
}

/* Itens das conversas anteriores */
.history-item {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    color: #c5b3e6;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    background: transparent;
    border: none;
}
.history-item:hover {
    background: rgba(141, 75, 230, 0.15);
    color: #ffffff;
}
.history-item.selected {
    background: rgba(141, 75, 230, 0.3);
    border-left: 3px solid #9d4edd;
    color: #ffffff;
    font-weight: 500;
}

/* Área de Widgets menores embutidos na lateral */
.sidebar-widgets {
    border-top: 1px solid rgba(141, 75, 230, 0.2);
    padding-top: 15px;
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.widget-text {
    font-size: 12px;
    color: #b39ddb;
    display: flex;
    justify-content: space-between;
    opacity: 0.9;
}

/* Rodapé do Menu Lateral - Configurações e Ajuda */
.sidebar-footer {
    border-top: 1px solid rgba(141, 75, 230, 0.2);
    padding-top: 15px;
    margin-top: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.footer-btn {
    width: 100%;
    background: transparent;
    border: none;
    padding: 12px;
    border-radius: 10px;
    color: #c5b3e6;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.2s;
}
.footer-btn:hover {
    background: rgba(141, 75, 230, 0.15);
    color: #fff;
}

/* CONTAINER PRINCIPAL DO CHAT (Transparência para revelar o fundo) */
.main-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: rgba(10, 8, 14, 0.3);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    transition: all 0.3s ease;
}

header {
    padding: 20px 40px;
    border-bottom: 1px solid rgba(141, 75, 230, 0.15);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(13, 11, 18, 0.6);
}

.header-left {
    display: flex;
    align-items: center;
    gap: 15px;
}

/* Botão do Menu Hamburguer para Celulares */
.menu-toggle {
    display: none;
    background: transparent;
    border: none;
    color: #e2d7ff;
    font-size: 24px;
    cursor: pointer;
}

.logo-interface {
    font-size: 26px;
    font-weight: 700;
    text-transform: uppercase;
    color: #e2d7ff;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(157, 78, 221, 0.6);
}

.header-subtitle {
    font-size: 13px; 
    color: #b39ddb; 
    letter-spacing: 1px; 
    text-transform: uppercase; 
    opacity: 0.8;
}

/* Janela de Mensagens */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 25px;
}

.msg {
    padding: 16px 24px;
    border-radius: 18px;
    max-width: 75%;
    white-space: pre-wrap;
    line-height: 1.6;
    word-break: break-word;
    font-size: 16px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #4a148c, #311b92);
    color: #ffffff;
    border-bottom-right-radius: 4px;
    border: 1px solid rgba(157, 78, 221, 0.3);
}

.ai {
    align-self: flex-start;
    background: rgba(20, 16, 28, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #e2d7ff;
    border: 1px solid rgba(141, 75, 230, 0.25);
    border-bottom-left-radius: 4px;
}

/* Área de Input Inferior Estilo Chat Completo */
.bottom {
    padding: 30px 40px;
    background: rgba(13, 11, 18, 0.6);
    border-top: 1px solid rgba(141, 75, 230, 0.15);
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.input-wrapper {
    display: flex;
    background: rgba(23, 18, 32, 0.9);
    border: 1px solid rgba(157, 78, 221, 0.3);
    border-radius: 16px;
    padding: 6px 12px;
    align-items: center;
    gap: 10px;
    box-shadow: 0 0 15px rgba(157, 78, 221, 0.1);
}

.input-wrapper:focus-within {
    border-color: rgba(157, 78, 221, 0.8);
    box-shadow: 0 0 18px rgba(157, 78, 221, 0.25);
}

input {
    flex: 1;
    padding: 14px 10px;
    border: none;
    background: transparent;
    color: #ffffff;
    outline: none;
    font-size: 16px;
}
input::placeholder {
    color: #7e6f99;
}

/* Botões de Ação */
button.action-btn {
    padding: 12px 24px;
    border: none;
    border-radius: 12px;
    background: #3b1e6d;
    color: #e2d7ff;
    font-weight: 600;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.2s;
    border: 1px solid #5a3793;
}
button.action-btn:hover { background: #5a3793; color: #fff; box-shadow: 0 0 10px rgba(157, 78, 221, 0.4); }

.btn-mic {
    background: transparent;
    border: none;
    color: #b39ddb;
    font-size: 20px;
    cursor: pointer;
    padding: 10px;
    transition: color 0.2s;
}
.btn-mic:hover { color: #d1c4e9; }
.btn-mic.listening {
    color: #ff80ab;
    animation: pulsePurple 1.5s infinite;
}

.btn-send {
    background: #4a148c;
    border: 1px solid #7c4dff;
    color: #ffffff;
    font-size: 18px;
    padding: 10px 18px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
}
.btn-send:hover { background: #6200ea; box-shadow: 0 0 12px rgba(124, 77, 255, 0.5); }

/* Painel Dev */
.devPanel {
    display: none;
    padding: 25px;
    background: rgba(20, 15, 28, 0.95);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-left: 1px solid rgba(157, 78, 221, 0.3);
    width: 320px;
    position: absolute;
    right: 0; top: 0;
    height: 100%;
    z-index: 2500;
}
.devPanel h3 { margin-top: 0; color: #d1c4e9; font-size: 18px; letter-spacing: 1px; }
.devPanel input { background: #0d0c12; border: 1px solid rgba(157, 78, 221, 0.3); width: 100%; border-radius: 10px; margin-bottom: 15px; padding: 12px; color: #fff; }

/* Overlay de fundo para fechar o menu no mobile */
.sidebar-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1500;
}

/* ==========================================================================
   MEDIA QUERIES - RESPONSIVIDADE COMPLETA PARA CELULARES
   ========================================================================== */
@media (max-width: 768px) {
    .menu-toggle {
        display: block; /* Revela o botão hamburguer no mobile */
    }

    .header-subtitle {
        display: none; /* Esconde o subtítulo longo no celular */
    }

    header {
        padding: 15px 20px;
    }

    .sidebar {
        position: fixed;
        left: 0; top: 0;
        transform: translateX(-100%); /* Esconde a sidebar para fora da tela */
    }

    /* Quando a sidebar estiver ativa no celular */
    body.sidebar-open .sidebar {
        transform: translateX(0);
        box-shadow: 5px 0 25px rgba(0,0,0,0.6);
    }

    body.sidebar-open .sidebar-overlay {
        display: block;
    }

    .chat {
        padding: 20px;
        gap: 15px;
    }

    .msg {
        max-width: 90%; /* Mensagens ocupam mais espaço no mobile */
        font-size: 15px;
        padding: 12px 18px;
    }

    .bottom {
        padding: 15px 20px;
    }

    .input-wrapper {
        padding: 4px 8px;
    }

    input {
        padding: 10px 5px;
        font-size: 15px;
    }
    
    .devPanel {
        width: 100%; /* Painel dev ocupa tela cheia no mobile */
    }
}
</style>
</head>

<body>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="standby-screen" id="standby">
        <div class="standby-core" onclick="initAudio()"></div>
        <div class="standby-text" id="statusText">SISTEMA ADORMECIDO<br><span style="font-size:12px; color:#9d4edd; font-weight: bold;">Clique no núcleo para vincular áudio</span></div>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="new-chat-btn" onclick="clearChatMobile()">
            <span>📝</span> Nova conversa
        </button>

        <div class="section-title">Conversas</div>
        
        <div class="conversations-section" id="historyList">
            <button class="history-item selected" onclick="focusInputMobile()">Nox AI: Diretrizes Iniciais</button>
        </div>

        <div class="sidebar-widgets">
            <div class="widget-text">
                <span>⏱️ Hora local:</span>
                <span id="widget-time" style="color: #e2d7ff; font-weight: bold;">00:00</span>
            </div>
            <div class="widget-text">
                <span>📊 RAM livre:</span>
                <span style="color: #e2d7ff;">57.1%</span>
            </div>
        </div>

        <div class="sidebar-footer">
            <button class="footer-btn" onclick="openDev()">⚙️ Configurações e ajuda</button>
            <button class="footer-btn" onclick="turnOffMobile()" style="color: #ff8a8a;">🔌 Desligar sistema</button>
        </div>
    </div>

    <div class="main-container">
        <header>
            <div class="header-left">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <h1 class="logo-interface" id="title">NOX AI</h1>
            </div>
            <div class="header-subtitle">Sistema de Controle Inteligente</div>
        </header>

        <div class="chat" id="chat"></div>

        <div class="bottom">
            <div class="input-wrapper">
                <input id="input" placeholder="Digite ou envie um comando..." />
                <button id="micBtn" class="btn-mic" onclick="toggleSpeech()">🎙️</button>
                <button class="btn-send" onclick="run()">➤</button>
            </div>
        </div>
    </div>

    <div class="devPanel" id="devPanel">
        <h3>🔐 PARÂMETROS DO TERMINAL</h3>
        <p style="font-size: 12px; color: #b39ddb; margin-top: 15px; margin-bottom: 5px;">NOME DA INTERFACE:</p>
        <input id="nameInput" />
        <button class="action-btn" style="width: 100%; margin-bottom: 10px;" onclick="saveDev()">Salvar Modificações</button>
        <button class="action-btn" style="width: 100%; background: #14131a; color: #b39ddb; border: 1px solid rgba(141, 75, 230, 0.2);" onclick="document.getElementById('devPanel').style.display='none'">Voltar</button>
    </div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const devPanel = document.getElementById("devPanel");
const nameInput = document.getElementById("nameInput");
const title = document.getElementById("title");
const statusText = document.getElementById("statusText");
const micBtn = document.getElementById("micBtn");
const historyList = document.getElementById("historyList");

// Chave do OpenRouter Fixada
const API_KEY = "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";

let isSystemActive = false;
let recognition;
let isListening = false;
let audioContext, analyser, microphone, javascriptNode;
const CLAP_THRESHOLD = 45; 

// Controladores do Menu responsivo
function toggleSidebar() {
    document.body.classList.toggle("sidebar-open");
}

function focusInputMobile() {
    focusInput();
    if(window.innerWidth <= 768) toggleSidebar();
}

function clearChatMobile() {
    clearChat();
    if(window.innerWidth <= 768) toggleSidebar();
}

function turnOffMobile() {
    turnOff();
    if(window.innerWidth <= 768) toggleSidebar();
}

function updateWidgetTime() {
    const now = new Date();
    document.getElementById('widget-time').innerText = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
}
setInterval(updateWidgetTime, 1000);
updateWidgetTime();

function initAudio() {
    if (audioContext) return;
    statusText.innerHTML = "SINCRO-SISTEMA ATIVANDO...";
    
    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function(stream) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        microphone = audioContext.createMediaStreamSource(stream);
        javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);
        analyser.smoothingTimeConstant = 0.3;
        analyser.fftSize = 1024;
        microphone.connect(analyser);
        analyser.connect(javascriptNode);
        javascriptNode.connect(audioContext.destination);

        statusText.innerHTML = "SISTEMA AMBIENTAL PRONTO<br><span style='color:#c090f9; font-weight:bold;'>👋 BATA PALMA PARA ENTRAR</span>";

        javascriptNode.onaudioprocess = function() {
            const array = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(array);
            let values = 0;
            for (let i = 0; i < array.length; i++) { values += array[i]; }
            if ((values / array.length) > CLAP_THRESHOLD && !isSystemActive) { turnOn(); }
        }
        initSpeechRecognition(); 
    }).catch(err => { 
        statusText.innerHTML = "<span style='color:#ffb3b3;'>ERRO DE CONEXÃO ACÚSTICA.</span>"; 
    });
}

function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return;

    recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add("listening");
        input.placeholder = "Escutando comandos...";
    };

    recognition.onresult = (event) => {
        input.value = event.results[0][0].transcript;
        run(); 
    };

    recognition.onend = () => {
        isListening = false;
        micBtn.classList.remove("listening");
        input.placeholder = "Digite ou envie um comando...";
    };
}

function toggleSpeech() {
    if (!recognition) return alert("Reconhecimento de voz indisponível.");
    if (isListening) { recognition.stop(); } else { recognition.start(); }
}

function turnOn() {
    isSystemActive = true;
    document.body.classList.add("active");
    chat.innerHTML = ""; 
    setTimeout(() => { add("Nox Ai ao seu dispor.", "ai"); }, 600);
}

function turnOff() {
    isSystemActive = false;
    document.body.classList.remove("active");
    statusText.innerHTML = "SISTEMA APAGADO<br><span style='color:#c090f9; font-weight:bold;'>👋 BATA PALMA PARA RETORNAR</span>";
}

input.addEventListener("keydown", function(e) { if (e.key === "Enter") { e.preventDefault(); run(); } });

function add(text, type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    if(type === "user") {
        addReminderList(text);
    }
}

function addReminderList(text) {
    document.querySelectorAll('.history-item').forEach(el => el.classList.remove('selected'));

    const item = document.createElement("button");
    item.className = "history-item selected";
    item.innerText = text;
    item.onclick = () => {
        document.querySelectorAll('.history-item').forEach(el => el.classList.remove('selected'));
        item.classList.add('selected');
        input.value = text;
        input.focus();
        if(window.innerWidth <= 768) toggleSidebar();
    };
    
    if(historyList.firstChild) {
        historyList.insertBefore(item, historyList.firstChild);
    } else {
        historyList.appendChild(item);
    }
}

function clearChat() {
    chat.innerHTML = "";
    add("Nova sessão iniciada. Nox AI pronta.", "ai");
    input.value = "";
    input.focus();
}

function focusInput() {
    input.focus();
}

async function askAI(msg){
    if(!API_KEY || API_KEY.trim() === "") return "⚠️ Nenhuma API KEY configurada no código.";
    try{
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":`Bearer ${API_KEY}`,
                "HTTP-Referer":"http://localhost",
                "X-Title":"NOX AI"
            },
            body:JSON.stringify({
                model:"openai/gpt-3.5-turbo",
                messages:[
                    {role:"system",content:"Você é a NOX AI. Suas respostas devem ser curtas, diretas, inteligentes e extremamente concisas."},
                    {role:"user",content:msg}
                ]
            })
        });
        const data = await res.json();
        return data.choices?.[0]?.message?.content || "Sem resposta.";
    }catch(e){ return "Sem resposta da rede externa."; }
}

async function run(){
    let text = input.value.trim();
    if(!text) return;

    add(text, "user");
    input.value = "";

    let aiResponse = await askAI(text);
    add(aiResponse, "ai");
}

function openDev(){
    let senha = prompt("Autenticação do Desenvolvedor:");
    if(senha !== "Davi") return alert("Acesso Negado.");
    devPanel.style.display = "block";
    nameInput.value = title.innerText;
}

function saveDev() {
    title.innerText = nameInput.value;
    devPanel.style.display = 'none';
}
</script>
</body>
</html>
