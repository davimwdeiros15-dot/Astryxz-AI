<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOX AI PRO</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#000814;
    color:#00e5ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app{
    width:95%;
    max-width:420px;
    height:95vh;
    background:#001018;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    border:1px solid #00e5ff55;
}

header{
    text-align:center;
    padding:10px;
    border-bottom:1px solid #00e5ff33;
}

.mode{
    font-size:12px;
    opacity:0.8;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.msg{
    padding:10px;
    border-radius:10px;
    max-width:90%;
    white-space:pre-wrap;
}

.user{
    align-self:flex-end;
    background:#00e5ff22;
}

.ai{
    align-self:flex-start;
    background:#002233;
}

.bottom{
    display:flex;
    flex-direction:column;
    padding:10px;
    gap:8px;
    border-top:1px solid #00e5ff33;
}

.row{
    display:flex;
    gap:5px;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#00141f;
    color:#00e5ff;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#00e5ff;
    font-weight:bold;
    cursor:pointer;
}

.devPanel{
    display:none;
    padding:10px;
    background:#000f1a;
    border-top:1px solid #00e5ff33;
}

</style>
</head>

<body>

<div class="app">

<header>
<h1 id="title">NOX AI</h1>
<div class="mode" id="modeText">Modo: Conversa</div>
</header>

<div class="chat" id="chat"></div>

<!-- 🔐 DEV PANEL -->

<div class="devPanel" id="devPanel">

<h3>🔐 MODO DEV ATIVO</h3>

<p>API KEY:</p>
<input id="apiInput" style="width:100%" />

<p>NOME DA IA:</p>
<input id="nameInput" style="width:100%" />

<button onclick="saveDev()">Salvar</button>
<button onclick="testAI()">Testar IA</button>

</div>

<div class="bottom">

<div class="row">
<button onclick="openDev()">⚙ Dev</button>
</div>

<div class="row">
<input id="input" placeholder="Digite aqui..." />
<button onclick="run()">➤</button>
</div>

</div>

</div>

<script>

//////////////////////////////////////////////////
// 🔗 ELEMENTOS
//////////////////////////////////////////////////

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const modeText = document.getElementById("modeText");
const devPanel = document.getElementById("devPanel");
const apiInput = document.getElementById("apiInput");
const nameInput = document.getElementById("nameInput");
const title = document.getElementById("title");

//////////////////////////////////////////////////
// 🔑 API
//////////////////////////////////////////////////

let API_KEY = "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";

//////////////////////////////////////////////////
// 💬 CHAT
//////////////////////////////////////////////////


function add(text,type){

const div = document.createElement("div");

div.className = "msg " + type;

div.innerText = text;

chat.appendChild(div);

chat.scrollTop = chat.scrollHeight;

}

//////////////////////////////////////////////////
// ⏰ HORA
//////////////////////////////////////////////////

function getTime(){

const now = new Date();

return now.toLocaleTimeString("pt-BR",{
timeZone:"America/Sao_Paulo",
hour:"2-digit",
minute:"2-digit",
second:"2-digit"
});

}

//////////////////////////////////////////////////
// 📅 DATA
//////////////////////////////////////////////////

function getDate(){

const now = new Date();

return now.toLocaleDateString("pt-BR",{
timeZone:"America/Sao_Paulo",
weekday:"long",
year:"numeric",
month:"long",
day:"numeric"
});

}

//////////////////////////////////////////////////
// 📱 ABRIR APPS ANDROID
//////////////////////////////////////////////////

function openApp(app){

app = app.toLowerCase().trim();

const apps = {

youtube:"intent://#Intent;package=com.google.android.youtube;end",
instagram:"intent://#Intent;package=com.instagram.android;end",
whatsapp:"intent://#Intent;package=com.whatsapp;end",
facebook:"intent://#Intent;package=com.facebook.katana;end",
tiktok:"intent://#Intent;package=com.zhiliaoapp.musically;end",
telegram:"intent://#Intent;package=org.telegram.messenger;end",
spotify:"intent://#Intent;package=com.spotify.music;end",
chrome:"intent://#Intent;package=com.android.chrome;end"

};

if(apps[app]){

window.location.href = apps[app];

add("🚀 Abrindo " + app + "...","ai");

return true;

}

add("❌ Aplicativo não encontrado.","ai");

return false;

}

//////////////////////////////////////////////////
// 🤖 NOX AI
//////////////////////////////////////////////////

async function askAI(msg){

try{

const res = await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${API_KEY}`,
"HTTP-Referer":"http://localhost",
"X-Title":"NOX AI"
},

body:JSON.stringify({

model:"openai/gpt-3.5-turbo",

messages:[

{
role:"system",

content:`

Você é a NOX AI.

Uma inteligência artificial avançada.

Hora atual: ${getTime()}
Data atual: ${getDate()}
Fuso horário: Brasil São Paulo

`

},

{
role:"user",
content:msg
}

]

})

});

const data = await res.json();

if(data.error){

return "Erro: " + data.error.message;

}

return data.choices?.[0]?.message?.content || "Sem resposta.";

}catch(e){

return "Erro de conexão.";

}

}

//////////////////////////////////////////////////
// 🚀 PRINCIPAL
//////////////////////////////////////////////////

async function run(){

let text = input.value.trim();

if(!text) return;

add(text,"user");

input.value = "";

//////////////////////////////////////////////////
// ⏰ COMANDOS
//////////////////////////////////////////////////

if(text.toLowerCase().includes("hora")){

add("⏰ " + getTime(),"ai");

return;

}

if(text.toLowerCase().includes("data")){

add("📅 " + getDate(),"ai");

return;

}

//////////////////////////////////////////////////
// 📱 ABRIR APP
//////////////////////////////////////////////////

if(text.toLowerCase().startsWith("abrir ")){

let app = text.replace("abrir ","");

if(openApp(app)) return;

}

//////////////////////////////////////////////////
// 🤖 IA
//////////////////////////////////////////////////

let ai = await askAI(text);

add(ai,"ai");

}

//////////////////////////////////////////////////
// ⚙ DEV MODE
//////////////////////////////////////////////////

function openDev(){

let senha = prompt("Senha Dev:");

if(senha !== "Davi"){

alert("Senha incorreta!");

return;

}

devPanel.style.display = "block";

apiInput.value = API_KEY;

nameInput.value = title.innerText;

add("🔐 Modo DEV ativado.","ai");

}

//////////////////////////////////////////////////
// 💾 SALVAR
//////////////////////////////////////////////////

function saveDev(){

API_KEY = apiInput.value;

title.innerText = nameInput.value;

add("⚙ Configurações salvas.","ai");

}

//////////////////////////////////////////////////
// 🧪 TESTAR IA
//////////////////////////////////////////////////

async function testAI(){

let r = await askAI("teste de conexão");

add(r,"ai");

}

//////////////////////////////////////////////////
// 🚀 START
//////////////////////////////////////////////////

add("NOX AI ONLINE 🚀 chat ativo.","ai");

</script>

</body>
</html>
