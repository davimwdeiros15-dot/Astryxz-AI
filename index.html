
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOX AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#05010f;
    color:white;
    height:100vh;
    overflow:hidden;
    display:flex;
}

.sidebar{
    width:260px;
    background:#090312;
    border-right:1px solid #1f123d;
    padding:20px;
    display:flex;
    flex-direction:column;
}

.logo{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
    color:#b06cff;
}

.new-chat{
    background:#7a3cff;
    border:none;
    padding:12px;
    border-radius:12px;
    color:white;
    cursor:pointer;
    margin-bottom:20px;
}

.history{
    flex:1;
    overflow:auto;
}

.history button{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    background:#130722;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
    background:
    radial-gradient(circle at center,#16042f,#05010f);
}

.topbar{
    height:70px;
    border-bottom:1px solid #1f123d;
    display:flex;
    align-items:center;
    padding:0 20px;
    justify-content:space-between;
}

.model-select{
    background:#120522;
    color:white;
    border:1px solid #45206f;
    padding:10px;
    border-radius:10px;
}

.chat{
    flex:1;
    overflow:auto;
    padding:30px;
}

.message{
    max-width:800px;
    padding:15px;
    border-radius:18px;
    margin-bottom:20px;
    line-height:1.5;
}

.user{
    background:#6f39ff;
    margin-left:auto;
}

.ai{
    background:#130722;
    border:1px solid #2f1a4d;
}

.chat img{
    max-width:300px;
    border-radius:15px;
    margin-top:10px;
}

.bottom{
    padding:20px;
    border-top:1px solid #1f123d;
}

.input-area{
    display:flex;
    align-items:center;
    background:#120522;
    border:1px solid #3b1f61;
    border-radius:18px;
    padding:10px;
}

textarea{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    resize:none;
    color:white;
    font-size:16px;
    height:30px;
}

.send{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:white;
    cursor:pointer;
    font-size:18px;
}

.upload{
    margin-right:10px;
    cursor:pointer;
}

.preview{
    margin-top:10px;
    display:none;
}

.preview img{
    width:120px;
    border-radius:12px;
}

.loader{
    display:flex;
    gap:5px;
}

.loader div{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#fff;
    animation:bounce 1s infinite;
}

.loader div:nth-child(2){
    animation-delay:0.2s;
}

.loader div:nth-child(3){
    animation-delay:0.4s;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}
</style>
</head>
<body>

<div class="sidebar">
    <div class="logo">NOX AI</div>

    <button class="new-chat" onclick="clearChat()">
        + Nova conversa
    </button>

    <div class="history" id="history"></div>
</div>

<div class="main">

    <div class="topbar">
        <h3>NOX AI SYSTEM</h3>

        <select class="model-select" id="model">
            <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
            <option value="openai/gpt-4o">GPT-4o</option>
            <option value="google/gemini-2.0-flash-exp:free">Gemini Vision</option>
        </select>
    </div>

    <div class="chat" id="chat"></div>

    <div class="bottom">

        <div class="input-area">

            <label class="upload">
                📎
                <input type="file" id="fileInput" hidden accept="image/*">
            </label>

            <textarea
                id="input"
                placeholder="Digite sua mensagem..."
            ></textarea>

            <button class="send" onclick="sendMessage()">
                ➤
            </button>

        </div>

        <div class="preview" id="preview">
            <img id="previewImg">
        </div>

    </div>

</div>

<script>
const API_KEY = "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";

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const historyDiv = document.getElementById("history");
const preview = document.getElementById("preview");
const previewImg = document.getElementById("previewImg");
const fileInput = document.getElementById("fileInput");

let selectedImage = "";
let historyData = [];

function addMessage(text,type,image=""){

    const div = document.createElement("div");

    div.className = "message " + type;

    if(text){
        div.innerHTML += text.replace(/\n/g,"<br>");
    }

    if(image){
        div.innerHTML += `<br><img src="${image}">`;
    }

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

function showLoader(){

    const div = document.createElement("div");

    div.className = "message ai";

    div.id = "loader";

    div.innerHTML = `
        <div class="loader">
            <div></div>
            <div></div>
            <div></div>
        </div>
    `;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

function removeLoader(){

    const loader = document.getElementById("loader");

    if(loader) loader.remove();
}

async function askAI(message,image){

    try{

        const model =
            document.getElementById("model").value;

        let content = [];

        if(message){
            content.push({
                type:"text",
                text:message
            });
        }

        if(image){
            content.push({
                type:"image_url",
                image_url:{
                    url:image
                }
            });
        }

        const response = await fetch(
            "https://openrouter.ai/api/v1/chat/completions",
            {
                method:"POST",

                headers:{
                    "Authorization":"Bearer " + API_KEY,
                    "Content-Type":"application/json",
                    "HTTP-Referer":window.location.href,
                    "X-Title":"NOX AI"
                },

                body:JSON.stringify({

                    model:model,

                    messages:[
                        {
                            role:"system",
                            content:"Você é a NOX AI."
                        },
                        {
                            role:"user",
                            content:content
                        }
                    ]
                })
            }
        );

        const data = await response.json();

        console.log(data);

        if(data.error){
            return "❌ " + data.error.message;
        }

        if(
            !data.choices ||
            !data.choices.length
        ){
            return "⚠️ Sem resposta.";
        }

        return data.choices[0].message.content;

    }catch(error){

        console.error(error);

        return "❌ Erro de conexão.";
    }
}

async function sendMessage(){

    const text = input.value.trim();

    if(!text && !selectedImage) return;

    addMessage(text,"user",selectedImage);

    input.value = "";

    showLoader();

    const response =
        await askAI(text,selectedImage);

    removeLoader();

    addMessage(response,"ai");

    historyData.unshift({
        text:text || "📷 imagem"
    });

    renderHistory();

    selectedImage = "";

    preview.style.display = "none";
}

function renderHistory(){

    historyDiv.innerHTML = "";

    historyData.forEach(item=>{

        const btn =
            document.createElement("button");

        btn.innerText = item.text;

        historyDiv.appendChild(btn);
    });
}

function clearChat(){

    chat.innerHTML = "";
}

input.addEventListener("keydown",(e)=>{

    if(e.key === "Enter" && !e.shiftKey){

        e.preventDefault();

        sendMessage();
    }
});

fileInput.addEventListener("change",(e)=>{

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(ev){

        selectedImage = ev.target.result;

        previewImg.src = selectedImage;

        preview.style.display = "block";
    };

    reader.readAsDataURL(file);
});

document.addEventListener("paste",(event)=>{

    const items = event.clipboardData.items;

    for(const item of items){

        if(item.type.startsWith("image/")){

            const file = item.getAsFile();

            const reader = new FileReader();

            reader.onload = function(ev){

                selectedImage = ev.target.result;

                previewImg.src = selectedImage;

                preview.style.display = "block";
            };

            reader.readAsDataURL(file);
        }
    }
});
</script>

</body>
</html>
